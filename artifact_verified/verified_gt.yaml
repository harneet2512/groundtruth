# mini-swe-agent config for SWE-bench Verified with GroundTruth (PATH B).
#
# Base: the installed minisweagent builtin config/benchmarks/swebench.yaml
# (2.2.8) — instance/observation templates, /testbed docker environment,
# submission protocol — with two deltas:
#   1. GT awareness section in the instance_template (ported from the proven
#      artifact_deepswe/gt_integration/deepswe_gt_pier.yaml:38-60): tells the
#      agent the <gt-evidence>/<gt-contract>/<gt-scope>/<gt-cochange>/<gt-nudge>
#      tags appear automatically and how to treat verified vs unverified lines.
#      Inert on the baseline arm (GT_BASELINE=1 -> no tags ever appear; the
#      paragraph references content that simply never shows). The substrate
#      BRIEF itself is prepended to {{task}} by gt_verified_agent.py
#      (consume-only, fail-closed) — never templated here, so the
#      single-<gt-task-brief>-tag invariant lives in ONE place.
#   2. model: DeepSeek official-spec sampling (paper-locked, identical to
#      deepswe_gt_pier.yaml:204-218): temp 1.0 / top_p 0.95 / max 8192 /
#      penalties 0 / thinking disabled; cost_tracking ignore_errors (litellm
#      has no price map entry for deepseek-v4-flash). No hardcoded model_name —
#      the runner passes --model.

agent:
  system_template: |
    You are a helpful assistant that can interact with a computer shell to solve programming tasks.
  instance_template: |
    <pr_description>
    Consider the following PR description:
    {{task}}
    </pr_description>

    <instructions>
    # Task Instructions

    ## Overview

    You're a software engineer interacting continuously with a computer by submitting commands.
    You'll be helping implement necessary changes to meet requirements in the PR description.
    Your task is specifically to make changes to non-test files in the current directory in order to fix the issue described in the PR description in a way that is general and consistent with the codebase.
    <IMPORTANT>This is an interactive process where you will think and issue AT LEAST ONE command, see the result, then think and issue your next command(s).</important>

    For each response:

    1. Include a THOUGHT section explaining your reasoning and what you're trying to accomplish
    2. Provide one or more bash tool calls to execute

    ## Codebase Intelligence (automatic)

    GroundTruth automatically appends evidence to command output inside
    <gt-evidence> tags when you read or edit source files. This evidence is
    built from the codebase call graph and includes:
    - Cross-file callers of the functions in the file you opened, and how they
      use the result (so you do not break them).
    - Behavioral contracts: the typed signatures of the functions your edit
      target CALLS (so you call them correctly).
    - Sibling functions at the same scope (the patterns you must match).

    Read those <gt-evidence> tags. Lines such as [WITNESS] and [CALLEE] are
    deterministically resolved cross-file facts you cannot get from the file
    alone; [CALLERS] location hints labeled "(unverified)" are leads to confirm
    with grep, not facts. The tags appear automatically; you do not call
    anything.

    GroundTruth may also append these blocks when relevant:
    - <gt-contract>: signatures and verified caller counts for functions in a file you edited -- preserve those interfaces.
    - <gt-scope>: graph-connected files around the file you are viewing -- candidate scope; confirm the edit target with grep.
    - <gt-cochange>: files that historically changed together with the file you edited -- check whether your fix needs them too.
    - <gt-nudge>: a one-time course-correction when your trajectory looks stuck.

    ## Important Boundaries

    - MODIFY: Regular source code files in /testbed (this is the working directory for all your subsequent commands)
    - DO NOT MODIFY: Tests, configuration files (pyproject.toml, setup.cfg, etc.)

    ## Recommended Workflow

    1. Analyze the codebase by finding and reading relevant files
    2. Create a script to reproduce the issue
    3. Edit the source code to resolve the issue
    4. Verify your fix works by running your script again
    5. Test edge cases to ensure your fix is robust

    ## Command Execution Rules

    You are operating in an environment where

    1. You issue at least one command
    2. The system executes the command(s) in a subshell
    3. You see the result(s)
    4. You write your next command(s)

    Each response should include:

    1. **Reasoning text** where you explain your analysis and plan
    2. At least one tool call with your command

    **CRITICAL REQUIREMENTS:**

    - Your response SHOULD include reasoning text explaining what you're doing
    - Your response MUST include AT LEAST ONE bash tool call. You can make MULTIPLE tool calls in a single response when the commands are independent (e.g., searching multiple files, reading different parts of the codebase).
    - Directory or environment variable changes are not persistent. Every action is executed in a new subshell.
    - However, you can prefix any action with `MY_ENV_VAR=MY_VALUE cd /path/to/working/dir && ...` or write/load environment variables from files

    Example of a CORRECT response:
    <example_response>
    I need to understand the Builder-related code. Let me find relevant files and check the project structure.

    [Makes multiple bash tool calls: {"command": "ls -la"}, {"command": "find src -name '*.java' | grep -i builder"}, {"command": "cat README.md | head -50"}]
    </example_response>

    ## Environment Details

    - You have a full Linux shell environment
    - Always use non-interactive flags (-y, -f) for commands
    - Avoid interactive tools like vi, nano, or any that require user input
    - You can use bash commands or invoke any tool that is available in the environment
    - You can also create new tools or scripts to help you with the task
    - If a tool isn't available, you can also install it

    ## Submission

    When you've completed your work, you MUST submit your changes as a git patch.
    Follow these steps IN ORDER, with SEPARATE commands:

    Step 1: Create the patch file
    Run `git diff -- path/to/file1 path/to/file2 > patch.txt` listing only the source files you modified.
    Do NOT commit your changes.

    <IMPORTANT>
    The patch must only contain changes to the specific source files you modified to fix the issue.
    Do not submit file creations or changes to any of the following files:

    - test and reproduction files
    - helper scripts, tests, or tools that you created
    - installation, build, packaging, configuration, or setup scripts unless they are directly part of the issue you were fixing (you can assume that the environment is already set up for your client)
    - binary or compiled files
    </IMPORTANT>

    Step 2: Verify your patch
    Inspect patch.txt to confirm it only contains your intended changes and headers show `--- a/` and `+++ b/` paths.

    Step 3: Submit (EXACT command required)
    You MUST use this EXACT command to submit:

    ```bash
    echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT && cat patch.txt
    ```

    If the command fails (nonzero exit status), it will not submit.

    <CRITICAL>
    - Creating/viewing the patch and submitting it MUST be separate commands (not combined with &&).
    - If you modify patch.txt after verifying, you SHOULD verify again before submitting.
    - You CANNOT continue working (reading, editing, testing) in any way on this task after submitting.
    </CRITICAL>
    </instructions>
  step_limit: 250          # the REAL upper bound on agent work for this run.
  # cost_limit is INERT for deepseek-v4-flash: litellm has no price-map entry for
  # this model, so cost_tracking is "ignore_errors" and the per-call cost pins to
  # 0.0 -> this 3.0 ceiling is NEVER reached and NEVER triggers. It is kept only
  # as a defensive cap for any future priced model. Do NOT cite cost_limit as an
  # active control on this run — the real bounds are: step_limit (250) + the
  # 60-minute GHA job timeout + max_parallel (20) at dispatch.
  cost_limit: 3.0

# The agent process runs ON THE HOST; DockerEnvironment drives the task image
# via `docker exec` (minisweagent/environments/docker.py:101-138). config.env
# entries are forwarded into the container as `-e KEY=VALUE` (docker.py:111-112)
# — that is the env path INTO the container if in-container GT vars are ever
# needed; the GT pillars themselves run host-side and read host env directly.
environment:
  cwd: "/testbed"
  timeout: 60
  interpreter: ["bash", "-c"]
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: "off"
    TQDM_DISABLE: "1"
  environment_class: docker

model:
  observation_template: |
    {% if output.exception_info -%}
    <exception>{{output.exception_info}}</exception>
    {% endif -%}
    <returncode>{{output.returncode}}</returncode>
    {% if output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    The output of your last command was too long.
    Please try a different command that produces less output.
    If you're looking at a file you can try use head, tail or sed to view a smaller number of lines selectively.
    If you're using grep or find and it produced too much output, you can use a more selective search pattern.
    If you really need to see something from the full command's output, you can redirect output to a file and then search in that file.
    </warning>
    {%- set elided_chars = output.output | length - 10000 -%}
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    {{ elided_chars }} characters elided
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}
  format_error_template: |
    Tool call error:

    <error>
    {{error}}
    </error>

    Here is general guidance on how to submit correct toolcalls:

    Every response needs to use the 'bash' tool at least once to execute commands.

    Call the bash tool with your command as the argument:
    - Tool: bash
    - Arguments: {"command": "your_command_here"}

    If you have completed your assignment, please consult the first message about how to
    submit your solution (you will not be able to continue working on this task after that).
  cost_tracking: "ignore_errors"
  model_kwargs:
    drop_params: true
    # DeepSeek official-spec sampling (paper-locked, parity with
    # deepswe_gt_pier.yaml + .llm_config/*deepseek_v32.json): temp 1.0 /
    # top_p 0.95 / max 8192 / penalties 0. Thinking disabled (V4 default is
    # THINKING-ON, which bloats tokens+cost and is incompatible with multi-turn
    # harnesses per the V3.2 paper); litellm forwards extra_body to DeepSeek.
    temperature: 1.0
    top_p: 0.95
    max_tokens: 8192
    presence_penalty: 0
    frequency_penalty: 0
    # litellm-level retry on transient API errors (rate limits / 5xx) — parity
    # with deepswe_gt_pier.yaml: model_kwargs -> litellm.completion ->
    # completion_with_retries (tenacity). Sits UNDER mini-swe-agent's own
    # outer retry.
    num_retries: 3
    extra_body:
      thinking:
        type: disabled
