name: 'Setup Eval Environment'
description: 'Cache and install OpenHands 0.54.0, gt-index, GroundTruth, and datasets'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache site-packages + OpenHands + gt-index
      id: full-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          /tmp/OpenHands
          /tmp/gt-index
          /opt/hostedtoolcache/Python/3.12.*/x64/lib/python3.12/site-packages
          /opt/hostedtoolcache/Python/3.12.*/x64/bin
        key: eval-env-oh054-gt-${{ hashFiles('pyproject.toml', 'gt-index/**/*.go') }}
        restore-keys: eval-env-oh054-gt-

    - name: Install (skip if cached)
      shell: bash
      run: |
        if python -c "import openhands; import groundtruth; import datasets" 2>/dev/null && [ -f /tmp/gt-index ]; then
          echo "All packages importable + gt-index present — full cache hit, skipping install"
        else
          echo "Cache miss — installing..."
          if [ ! -d /tmp/OpenHands/.git ]; then
            git clone --depth 1 --branch 0.54.0 https://github.com/All-Hands-AI/OpenHands.git /tmp/OpenHands
          fi
          cd /tmp/OpenHands && pip install -e .
          pip install datasets
          cd $GITHUB_WORKSPACE && pip install -e .
          if [ ! -f /tmp/gt-index ]; then
            cd $GITHUB_WORKSPACE/gt-index
            CGO_ENABLED=1 go build -o /tmp/gt-index ./cmd/gt-index/
            chmod +x /tmp/gt-index
          fi
        fi
        echo "GT_INDEX_BINARY=/tmp/gt-index" >> $GITHUB_ENV
