name: CI

on:
  push:
    branches: [main, master, "release/**"]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check src/groundtruth/ tests/
      - run: ruff format --check src/groundtruth/ tests/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -x -v --ignore=tests/integration/test_real_lsp.py --ignore=tests/integration/test_depth_parity.py --ignore=tests/test_graphstore_contract.py --timeout=60 --cov=src/groundtruth --cov-report=term-missing

  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.22"
      - name: Build gt-index
        working-directory: gt-index
        run: CGO_ENABLED=1 go build -o gt-index ./cmd/gt-index/
      - name: Test indexing
        working-directory: gt-index
        run: |
          mkdir -p /tmp/test-repo
          cat > /tmp/test-repo/main.py << 'PYEOF'
          def hello():
              return "world"
          def greet(name):
              return hello() + " " + name
          PYEOF
          cat > /tmp/test-repo/app.py << 'PYEOF'
          from main import hello
          result = hello()
          PYEOF
          ./gt-index -root /tmp/test-repo -output /tmp/test-repo/graph.db
          python3 -c "
          import sqlite3
          conn = sqlite3.connect('/tmp/test-repo/graph.db')
          nodes = conn.execute('SELECT COUNT(*) FROM nodes').fetchone()[0]
          edges = conn.execute('SELECT COUNT(*) FROM edges').fetchone()[0]
          assert nodes > 0, f'Expected nodes > 0, got {nodes}'
          assert edges > 0, f'Expected edges > 0, got {edges}'
          conn.execute('SELECT confidence FROM edges LIMIT 0')
          print(f'OK: {nodes} nodes, {edges} edges, confidence column present')
          "

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: python benchmarks/runner.py --fixture python

  # Hard gate: validation honesty contract must hold.
  # groundtruth_validate must never return valid=True (or omit degraded flag)
  # when LSP is unavailable. This test enforces the tri-state valid field contract.
  validate-degraded-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Validate degraded-mode contract
        run: python scripts/validate_phase2_validation.py

  # Hard gate: release.yml asset naming contract must be consistent with _binary.py.
  # Verifies that the platform map in _binary.py matches the archive names produced
  # by the release workflow.
  validate-release-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Verify release asset naming contract
        run: |
          python3 - <<'EOF'
          import sys
          sys.path.insert(0, "src")
          from groundtruth._binary import _PLATFORM_MAP

          # These must match what release.yml produces
          RELEASE_YML_ARCHIVES = {
              "gt-index-linux-amd64.tar.gz",
              "gt-index-linux-arm64.tar.gz",
              "gt-index-darwin-amd64.tar.gz",
              "gt-index-darwin-arm64.tar.gz",
              "gt-index-windows-amd64.zip",
          }

          binary_py_archives = set(_PLATFORM_MAP.values())

          missing_in_release = binary_py_archives - RELEASE_YML_ARCHIVES
          missing_in_binary = RELEASE_YML_ARCHIVES - binary_py_archives

          if missing_in_release:
              print(f"ERROR: _binary.py expects these archives not produced by release.yml: {missing_in_release}")
              sys.exit(1)
          if missing_in_binary:
              print(f"ERROR: release.yml produces these archives not expected by _binary.py: {missing_in_binary}")
              sys.exit(1)

          print(f"PASS: all {len(binary_py_archives)} archive names match between _binary.py and release.yml")
          print(f"  Archives: {sorted(binary_py_archives)}")
          EOF
