name: "DeepSWE: Baseline probe (measure cost/time/result format)"

# Calibration probe — run N deterministic DeepSWE tasks with the STOCK
# mini-swe-agent (no GT = baseline) via Pier, and measure:
#   - real cost (DeepSeek balance delta)
#   - wall time (total + per-task)
#   - result.json pass/fail format (so the full-run aggregator parses it right)
# This is the cheap calibration before committing to all 113.

on:
  workflow_dispatch:
    inputs:
      n_tasks:
        description: "Number of deterministic tasks to probe"
        required: true
        default: "3"
      sample_seed:
        description: "Sample seed (deterministic subset)"
        required: true
        default: "0"
      model:
        description: "LLM model"
        required: true
        default: "deepseek/deepseek-v4-flash"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - name: Checkout GroundTruth
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pier + groundtruth
        run: |
          pip install datacurve-pier
          pip install -e .

      - name: Clone deep-swe
        run: |
          if [ ! -d "deepswe-bench" ]; then
            git clone --depth 1 https://github.com/datacurve-ai/deep-swe.git deepswe-bench
          fi
          echo "tasks available: $(ls deepswe-bench/tasks 2>/dev/null | wc -l)"

      - name: Validate DeepSeek key
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then echo "::error::DEEPSEEK_API_KEY not set"; exit 1; fi
          echo "DeepSeek key present (${#DEEPSEEK_API_KEY} chars)"

      - name: DeepSeek balance BEFORE
        run: |
          curl -s https://api.deepseek.com/user/balance \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" > /tmp/balance_before.json || echo '{}' > /tmp/balance_before.json
          echo "before: $(cat /tmp/balance_before.json)"

      - name: Run baseline probe (stock mini-swe-agent, no GT)
        run: |
          echo "=== DeepSWE baseline probe: ${{ inputs.n_tasks }} tasks, seed ${{ inputs.sample_seed }} ==="
          START=$(date +%s)
          pier run \
            -p deepswe-bench/tasks \
            --n-tasks ${{ inputs.n_tasks }} \
            --sample-seed ${{ inputs.sample_seed }} \
            --agent mini-swe-agent \
            --model ${{ inputs.model }} \
            --env docker \
            -y \
            2>&1 | tee /tmp/probe.log || true
          END=$(date +%s)
          echo "WALL_SECONDS=$((END-START))" | tee /tmp/wall.txt
          echo "=== probe complete in $(( (END-START)/60 )) min ==="

      - name: DeepSeek balance AFTER
        if: always()
        run: |
          curl -s https://api.deepseek.com/user/balance \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" > /tmp/balance_after.json || echo '{}' > /tmp/balance_after.json
          echo "after: $(cat /tmp/balance_after.json)"

      - name: Summarize (cost / time / result format)
        if: always()
        run: |
          mkdir -p probe_results
          cp /tmp/probe.log /tmp/balance_before.json /tmp/balance_after.json /tmp/wall.txt probe_results/ 2>/dev/null || true
          # collect every result.json pier wrote (format discovery)
          find . -name "result.json" -not -path "*/deepswe-bench/.git/*" -exec sh -c 'mkdir -p probe_results/results; cp "$1" "probe_results/results/$(echo $1 | tr "/" "_")"' _ {} \; 2>/dev/null || true
          find . -path "*logs*" \( -name "*.json" -o -name "*trajectory*" \) -not -path "*/.git/*" 2>/dev/null | head -40 \
            | while read f; do mkdir -p probe_results/logs; cp "$f" "probe_results/logs/$(echo $f | tr '/' '_')" 2>/dev/null || true; done

          python3 - <<'PY'
          import json, glob, os
          def bal(p):
              try:
                  d=json.load(open(p))
                  # DeepSeek balance shape: {"balance_infos":[{"total_balance":"x.xx",...}]}
                  bi=d.get("balance_infos") or []
                  return float(bi[0]["total_balance"]) if bi else None
              except Exception: return None
          b=bal("/tmp/balance_before.json"); a=bal("/tmp/balance_after.json")
          wall=open("/tmp/wall.txt").read().strip().split("=")[-1] if os.path.exists("/tmp/wall.txt") else "?"
          n=int(os.environ.get("NT","3"))
          print("="*50)
          print("DEEPSWE BASELINE PROBE SUMMARY")
          print("="*50)
          if b is not None and a is not None:
              cost=round(b-a,4)
              print(f"cost: ${cost}  (balance {b} -> {a})   per-task ~${round(cost/n,4)}")
          else:
              print(f"cost: balance API unparsed (before={open('/tmp/balance_before.json').read()[:120]})")
          try:
              ws=int(wall); print(f"wall: {ws}s = {ws//60}min total   per-task ~{ws//60//n}min")
          except Exception: print(f"wall: {wall}")
          # result.json format discovery
          rfs=glob.glob("probe_results/results/*")
          print(f"\nresult.json files found: {len(rfs)}")
          for rf in rfs[:3]:
              try:
                  d=json.load(open(rf))
                  print(f"  {os.path.basename(rf)} keys: {list(d.keys())[:12]}")
                  for k in ("resolved","passed","success","reward","exit_status","verifier","score","exception_message"):
                      if k in d: print(f"    {k} = {d[k]!r}")
              except Exception as e: print(f"  parse fail {rf}: {e}")
          PY
        env:
          NT: ${{ inputs.n_tasks }}

      - name: Upload probe results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepswe-baseline-probe
          path: probe_results/
          retention-days: 30
          if-no-files-found: warn
