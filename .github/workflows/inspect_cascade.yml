name: "Inspect Baseline Cascade (1→29)"

on:
  workflow_dispatch:
    inputs:
      gt_commit:
        description: 'GT branch/commit'
        required: true
        default: 'inspect_urself'
      max_messages:
        description: 'Max agent messages per task'
        required: true
        default: '100'

permissions:
  contents: read
  packages: read

env:
  OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

jobs:
  # ==================== STAGE 1: Single task gate ====================
  stage1:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      passed: ${{ steps.gate.outputs.passed }}
      patch_found: ${{ steps.gate.outputs.patch_found }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.gt_commit }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          pip install "inspect-ai" "inspect-evals[swe_bench]" datasets "openai>=2.26.0"
          pip install -e .

      - name: Build gt-index
        run: |
          cd gt-index
          CGO_ENABLED=1 go build -o /tmp/gt-index ./cmd/gt-index/
          echo "GT_INDEX_BINARY=/tmp/gt-index" >> $GITHUB_ENV

      - name: Pre-flight
        run: |
          test -x /tmp/gt-index && echo "gt-index: OK"
          python3 -c "from adapters.inspect.task import swebench_gt_baseline; print('task: OK')"
          echo "DeepSeek probe..."
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.deepseek.com/chat/completions" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"deepseek-v4-flash","messages":[{"role":"user","content":"ok"}],"max_tokens":1,"thinking":{"type":"disabled"}}')
          [ "$HTTP" = "200" ] && echo "DeepSeek: OK" || { echo "FAIL: HTTP $HTTP"; exit 1; }

      - name: Pull Docker image
        run: |
          docker pull docker.io/starryzhang/sweb.eval.x86_64.beetbox_1776_beets-5495:latest || echo "WARN: pull failed"

      - name: "Stage 1: Run 1 task (beets-5495)"
        env:
          PYTHONPATH: "${{ github.workspace }}"
        run: |
          mkdir -p /tmp/inspect_logs
          inspect eval adapters/inspect/task.py@swebench_gt_baseline \
            --model openai/deepseek-v4-flash \
            --model-base-url https://api.deepseek.com \
            --sample-id beetbox__beets-5495 \
            --log-dir /tmp/inspect_logs \
            --message-limit ${{ inputs.max_messages }} \
            2>&1 | tee /tmp/stage1.log

      - name: Extract results
        id: gate
        env:
          PYTHONPATH: "${{ github.workspace }}"
        run: |
          python3 << 'PYEOF'
          import os, glob
          from inspect_ai.log import read_eval_log

          evals = sorted(glob.glob("/tmp/inspect_logs/*.eval"))
          if not evals:
              print("::set-output name=passed::false")
              print("::set-output name=patch_found::false")
              exit(0)

          log = read_eval_log(evals[-1])
          s = log.samples[0] if log.samples else None
          passed = log.status == "success" and s is not None
          patch = False
          if s and s.scores:
              for _, sc in s.scores.items():
                  if sc.value == "C":
                      patch = True

          print(f"Status: {log.status}, Patch: {patch}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"passed={'true' if passed else 'false'}\n")
              f.write(f"patch_found={'true' if patch else 'false'}\n")
          PYEOF

      - name: Upload stage 1 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage1-beets-5495
          path: /tmp/inspect_logs/
          retention-days: 14

  # ==================== STAGE 2: Remaining 29 tasks ====================
  prepare_stage2:
    needs: stage1
    if: needs.stage1.outputs.passed == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        run: |
          # All 30 tasks minus beets-5495 (already ran in stage 1)
          TASKS='["beancount__beancount-931","delgan__loguru-1297","delgan__loguru-1306","flexget__flexget-4306","flexget__flexget-4244","kozea__weasyprint-2300","kozea__weasyprint-2387","kozea__weasyprint-2405","kozea__weasyprint-2398","kozea__weasyprint-2303","pypsa__pypsa-1172","pypsa__pypsa-1112","pypsa__pypsa-1091","pypsa__pypsa-1195","aiogram__aiogram-1594","amoffat__sh-744","arviz-devs__arviz-2413","aws-cloudformation__cfn-lint-3875","aws-cloudformation__cfn-lint-3890","aws-cloudformation__cfn-lint-3855","aws-cloudformation__cfn-lint-4023","dulwich__dulwich-1399","dulwich__dulwich-1423","fal-ai__dbt-fal-842","getmoto__moto-8271","getmoto__moto-8301","graphql-python__graphene-1565","jd__tenacity-482","pre-commit__pre-commit-3584"]'
          echo "matrix={\"task\":$TASKS}" >> $GITHUB_OUTPUT

  stage2:
    needs: [stage1, prepare_stage2]
    if: needs.stage1.outputs.passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJson(needs.prepare_stage2.outputs.matrix) }}
      fail-fast: false
      max-parallel: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.gt_commit }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          pip install "inspect-ai" "inspect-evals[swe_bench]" datasets "openai>=2.26.0"
          pip install -e .

      - name: Build gt-index
        run: |
          cd gt-index
          CGO_ENABLED=1 go build -o /tmp/gt-index ./cmd/gt-index/
          echo "GT_INDEX_BINARY=/tmp/gt-index" >> $GITHUB_ENV

      - name: Pull Docker image
        run: |
          TASK="${{ matrix.task }}"
          ORG=$(echo "$TASK" | cut -d'_' -f1)
          REST=$(echo "$TASK" | sed "s/^${ORG}__//")
          IMAGE="docker.io/starryzhang/sweb.eval.x86_64.${ORG}_1776_${REST}:latest"
          docker pull "$IMAGE" || echo "WARN: pull failed for $TASK"

      - name: "Run: ${{ matrix.task }}"
        env:
          PYTHONPATH: "${{ github.workspace }}"
        run: |
          mkdir -p /tmp/inspect_logs
          inspect eval adapters/inspect/task.py@swebench_gt_baseline \
            --model openai/deepseek-v4-flash \
            --model-base-url https://api.deepseek.com \
            --sample-id "${{ matrix.task }}" \
            --log-dir /tmp/inspect_logs \
            --message-limit ${{ inputs.max_messages }} \
            2>&1 | tee /tmp/eval.log || true

      - name: "Evaluate: ${{ matrix.task }}"
        if: always()
        env:
          PYTHONPATH: "${{ github.workspace }}"
        run: |
          pip install --quiet "swebench>=4.0.0"
          mkdir -p /tmp/predictions /tmp/eval_results

          # Extract patch from Inspect eval log
          python3 << 'PYEOF'
          import glob, json, os
          from inspect_ai.log import read_eval_log

          evals = sorted(glob.glob("/tmp/inspect_logs/*.eval"))
          if not evals:
              print("NO EVAL LOG - skipping evaluation")
              with open("/tmp/eval_results/result.json", "w") as f:
                  json.dump({"instance_id": "${{ matrix.task }}", "resolved": False, "reason": "no_eval_log"}, f)
              exit(0)

          log = read_eval_log(evals[-1])
          s = log.samples[0] if log.samples else None
          if not s:
              print("NO SAMPLES")
              with open("/tmp/eval_results/result.json", "w") as f:
                  json.dump({"instance_id": "${{ matrix.task }}", "resolved": False, "reason": "no_samples"}, f)
              exit(0)

          patch = ""
          if s.scores:
              for _, sc in s.scores.items():
                  if sc.metadata and sc.metadata.get("full_diff"):
                      patch = sc.metadata["full_diff"]
                  elif sc.answer and "diff --git" in (sc.answer or ""):
                      patch = sc.answer

          pred = {
              "instance_id": str(s.id),
              "model_patch": patch,
              "model_name_or_path": "DeepSeek-V4-Flash-Inspect-Baseline"
          }
          with open("/tmp/predictions/predictions.jsonl", "w") as f:
              f.write(json.dumps(pred) + "\n")

          print(f"Patch length: {len(patch)} chars")
          print(f"Has diff: {'diff --git' in patch}")
          PYEOF

          # Run Microsoft SWE-bench-Live evaluation harness
          if [ -f /tmp/predictions/predictions.jsonl ] && grep -q "diff --git" /tmp/predictions/predictions.jsonl; then
            echo "Running swebench harness evaluation..."
            python -m swebench.harness.run_evaluation \
              --dataset_name SWE-bench-Live/SWE-bench-Live \
              --split lite \
              --namespace starryzhang \
              --predictions_path /tmp/predictions/predictions.jsonl \
              --max_workers 1 \
              --run_id inspect_eval \
              2>&1 | tee /tmp/eval_results/harness.log || true

            # Extract resolve verdict
            REPORT=$(find /tmp -name "*.inspect_eval.json" -type f 2>/dev/null | head -1)
            if [ -n "$REPORT" ]; then
              python3 -c "
          import json
          with open('$REPORT') as f:
              r = json.load(f)
          resolved = r.get('resolved_instances', r.get('resolved', 0))
          if isinstance(resolved, list):
              resolved = len(resolved)
          total = r.get('total_instances', 1)
          print(f'RESOLVED: {resolved}/{total}')
          with open('/tmp/eval_results/result.json', 'w') as f:
              json.dump({'instance_id': '${{ matrix.task }}', 'resolved': resolved > 0, 'resolved_count': resolved}, f)
          "
            else
              echo "No harness report found"
              echo '{"instance_id": "${{ matrix.task }}", "resolved": false, "reason": "no_harness_report"}' > /tmp/eval_results/result.json
            fi
          else
            echo "No patch to evaluate"
            echo '{"instance_id": "${{ matrix.task }}", "resolved": false, "reason": "no_patch"}' > /tmp/eval_results/result.json
          fi

          cat /tmp/eval_results/result.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspect-${{ matrix.task }}
          path: |
            /tmp/inspect_logs/
            /tmp/eval_results/
            /tmp/predictions/
          retention-days: 14

  # ==================== SUMMARY ====================
  summary:
    needs: [stage1, stage2]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.gt_commit }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install "inspect-ai"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/all_logs

      - name: Aggregate results
        env:
          PYTHONPATH: "${{ github.workspace }}"
        run: |
          python3 << 'PYEOF'
          import glob, json

          # Collect resolve verdicts from result.json files
          results = glob.glob("/tmp/all_logs/**/result.json", recursive=True)
          print(f"Found {len(results)} result files")

          resolved = 0
          patches = 0
          total = 0
          for path in sorted(results):
              try:
                  with open(path) as f:
                      r = json.load(f)
                  iid = r.get("instance_id", "?")
                  is_resolved = r.get("resolved", False)
                  reason = r.get("reason", "")
                  total += 1
                  if is_resolved:
                      resolved += 1
                      patches += 1
                      print(f"  RESOLVED: {iid}")
                  elif reason == "no_patch":
                      print(f"  NO_PATCH: {iid}")
                  else:
                      patches += 1  # had patch but didn't resolve
                      print(f"  FAILED:   {iid} ({reason})")
              except Exception as e:
                  print(f"  ERROR: {path}: {e}")

          print(f"\n{'='*50}")
          print(f"RESOLVE RATE: {resolved}/{total} ({resolved*100//max(total,1)}%)")
          print(f"PATCH RATE:   {patches}/{total} ({patches*100//max(total,1)}%)")
          print(f"{'='*50}")
          PYEOF
          PYEOF
