name: "DeepSWE: Single GT trial"

# Run a single DeepSWE task with GT-augmented mini-swe-agent via Pier.
# Injects gt_hook.py into the container for on-demand codebase intelligence.

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "DeepSWE task ID (e.g., dateutil-rfc5545-timezone-interop)"
        required: true
        default: "dateutil-rfc5545-timezone-interop"
      model:
        description: "LLM model"
        required: true
        default: "deepseek/deepseek-v4-flash"

jobs:
  trial:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - name: Checkout GroundTruth
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pier and groundtruth
        run: |
          pip install datacurve-pier
          pip install -e .
          # Full-potential GT on the runner (host-side brief): ONNX embedder (no torch)
          # + Python LSP. The host runner HAS internet, so fetch is fine here; the brief
          # (gt_agent._generate_brief) runs host-side, so the runner is where these matter.
          pip install onnxruntime tokenizers huggingface_hub pyright || echo "WARN: gt deps"
          python scripts/setup_models.py || echo "WARN: embedder model fetch failed"

      - name: Clone deepswe-bench (if not present)
        run: |
          if [ ! -d "deepswe-bench" ]; then
            git clone --depth 1 https://github.com/datacurve-ai/deep-swe.git deepswe-bench
          fi

      - name: Validate task exists
        run: |
          TASK_DIR="deepswe-bench/tasks/${{ inputs.task_id }}"
          if [ ! -d "$TASK_DIR" ]; then
            echo "::error::Task directory not found: $TASK_DIR"
            echo "Available tasks:"
            ls deepswe-bench/tasks/ | head -20
            exit 1
          fi
          echo "Task directory: $TASK_DIR"
          ls -la "$TASK_DIR"

      - name: Build graph.db + extract source, wire the brief (Point A)
        run: |
          set -e
          TASK_DIR="deepswe-bench/tasks/${{ inputs.task_id }}"
          IMG=$(python3 -c "import tomllib;print(tomllib.load(open('$TASK_DIR/task.toml','rb'))['docker_image'])")
          echo "task image: $IMG"
          docker pull "$IMG" || { echo "::warning::image pull failed — brief stays off"; exit 0; }
          docker rm -f gtsrc 2>/dev/null || true
          docker run -d --name gtsrc "$IMG" sleep 1800 >/dev/null
          ROOT=$(docker exec gtsrc bash -c 'for d in /home/user /testbed /workspace /app /repo; do [ -d "$d/.git" ] && echo "$d" && break; done')
          ROOT=${ROOT:-/testbed}
          echo "repo root: $ROOT"
          # gt-index linux binary (build once if missing)
          if [ ! -x gt-index/gt-index-linux ]; then
            (cd gt-index && CGO_ENABLED=1 go build -o gt-index-linux ./cmd/gt-index/) || echo "WARN: gt-index build"
          fi
          mkdir -p /tmp/gt
          docker cp gt-index/gt-index-linux gtsrc:/tmp/gt-index && docker exec gtsrc chmod +x /tmp/gt-index
          docker exec gtsrc /tmp/gt-index -root="$ROOT" -output=/tmp/graph.db 2>&1 | tail -3 || echo "WARN: gt-index run"
          docker cp gtsrc:/tmp/graph.db /tmp/gt/graph.db 2>/dev/null || echo "WARN: no graph.db"
          # extract repo source to the runner — the host-side brief's grep/semantic read files
          mkdir -p /tmp/gt/src && docker cp "gtsrc:$ROOT/." /tmp/gt/src 2>/dev/null || echo "WARN: no source"
          docker rm -f gtsrc 2>/dev/null || true
          # offline LSP precision pass (full-potential; pyright installed on the runner)
          if [ -f /tmp/gt/graph.db ]; then
            python -m groundtruth.resolve --db /tmp/gt/graph.db --root /tmp/gt/src --resolve --lang python 2>&1 | tail -2 || echo "WARN: lsp"
            echo "GT_GRAPH_DB=/tmp/gt/graph.db" >> "$GITHUB_ENV"
            echo "GT_REPO_ROOT=/tmp/gt/src" >> "$GITHUB_ENV"
            echo "GT brief WIRED: graph.db $(stat -c%s /tmp/gt/graph.db) bytes, src $(ls /tmp/gt/src | wc -l) entries"
          else
            echo "::warning::graph.db missing — Point A brief will skip (DeepSWE runs hook-only)"
          fi

      - name: Preflight — prove GT is correct + full-potential before the paid run
        if: ${{ env.GT_GRAPH_DB != '' }}
        run: |
          GT_REQUIRE_FULL_POTENTIAL=1 python scripts/verify/preflight_pipeline.py \
            --db /tmp/gt/graph.db --root /tmp/gt/src || \
            echo "::warning::preflight flagged degradation — see checks above (run continues; gate is advisory here)"

      - name: Run GT trial
        run: |
          echo "=== DeepSWE GT Trial ==="
          echo "Task:  ${{ inputs.task_id }}"
          echo "Model: ${{ inputs.model }}"
          echo "GT_GRAPH_DB: ${GT_GRAPH_DB:-<unset -> brief off>}"
          echo ""

          pier run \
            -p deepswe-bench/tasks/${{ inputs.task_id }} \
            --agent-import-path artifact_deepswe.gt_agent:GTMiniSweAgent \
            --model ${{ inputs.model }} \
            --env docker \
            -y \
            --ak config_file=artifact_deepswe/gt_integration/deepswe_gt_pier.yaml \
            2>&1 | tee trial_output.log

          echo ""
          echo "=== Trial complete ==="

      - name: Collect results
        if: always()
        run: |
          mkdir -p trial_results

          # Copy pier output
          cp trial_output.log trial_results/ 2>/dev/null || true

          # Find and copy trajectory files
          find . -path "*/logs/*trajectory*" -exec cp {} trial_results/ \; 2>/dev/null || true
          find . -path "*/logs/*mini-swe-agent*" -exec cp {} trial_results/ \; 2>/dev/null || true

          # Find and copy pier results
          for d in results output pier-output; do
            if [ -d "$d" ]; then
              cp -r "$d" trial_results/ 2>/dev/null || true
            fi
          done

          echo "Collected artifacts:"
          find trial_results -type f | head -20

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepswe-gt-trial-${{ inputs.task_id }}
          path: trial_results/
          retention-days: 30
          if-no-files-found: warn
