name: "DeepSWE: Single GT trial"

# Run a single DeepSWE task with GT-augmented mini-swe-agent via Pier.
# Injects gt_hook.py into the container for on-demand codebase intelligence.

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "DeepSWE task ID (e.g., dateutil-rfc5545-timezone-interop)"
        required: true
        default: "dateutil-rfc5545-timezone-interop"
      model:
        description: "LLM model"
        required: true
        default: "deepseek/deepseek-v4-flash"

jobs:
  trial:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - name: Checkout GroundTruth
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pier, groundtruth, embedder + ALL LSP servers, build gt-index
        run: |
          pip install datacurve-pier
          pip install -e .
          # Full-potential GT on the runner (host-side brief runs here): ONNX embedder
          # (no torch) + ALL 4 LSP servers so non-Python tasks (go/ts/js/rust) get the
          # precision pass too. Runner has internet; per-run install (speed-optimized to
          # the baked image later).
          pip install onnxruntime tokenizers huggingface_hub pyright || echo "WARN: py deps"
          python scripts/setup_models.py || echo "WARN: embedder model fetch failed"
          go install golang.org/x/tools/gopls@latest && sudo cp "$(go env GOPATH)/bin/gopls" /usr/local/bin/ || echo "WARN: gopls"
          npm install -g typescript typescript-language-server || echo "WARN: ts-language-server"
          curl -fsSL https://github.com/rust-lang/rust-analyzer/releases/latest/download/rust-analyzer-x86_64-unknown-linux-gnu.gz | gunzip -c | sudo tee /usr/local/bin/rust-analyzer >/dev/null && sudo chmod +x /usr/local/bin/rust-analyzer || echo "WARN: rust-analyzer"
          # gt-index linux binary (preindex builds it the same way)
          (cd gt-index && CGO_ENABLED=1 go build -o gt-index-linux ./cmd/gt-index/ && chmod +x gt-index-linux) || echo "WARN: gt-index build"
          echo "=== installed LSP servers ==="
          for s in pyright-langserver gopls rust-analyzer typescript-language-server; do command -v $s && echo "  $s OK" || echo "  $s MISSING"; done

      - name: Clone deepswe-bench (if not present)
        run: |
          if [ ! -d "deepswe-bench" ]; then
            git clone --depth 1 https://github.com/datacurve-ai/deep-swe.git deepswe-bench
          fi

      - name: Validate task exists
        run: |
          TASK_DIR="deepswe-bench/tasks/${{ inputs.task_id }}"
          if [ ! -d "$TASK_DIR" ]; then
            echo "::error::Task directory not found: $TASK_DIR"
            echo "Available tasks:"
            ls deepswe-bench/tasks/ | head -20
            exit 1
          fi
          echo "Task directory: $TASK_DIR"
          ls -la "$TASK_DIR"

      - name: Build graph.db + extract source, wire the brief (Point A)
        run: |
          set -e
          TASK_DIR="deepswe-bench/tasks/${{ inputs.task_id }}"
          IMG=$(python3 -c "import tomllib;t=tomllib.load(open('$TASK_DIR/task.toml','rb'));print(t.get('environment',{}).get('docker_image',''))")
          [ -z "$IMG" ] && { echo "::warning::no docker_image in task.toml — brief stays off"; exit 0; }
          echo "task image: $IMG"
          docker pull "$IMG" || { echo "::warning::image pull failed — brief stays off"; exit 0; }
          docker rm -f gtsrc 2>/dev/null || true
          docker run -d --name gtsrc "$IMG" sleep 1800 >/dev/null
          ROOT=$(docker exec gtsrc bash -c 'for d in /home/user /testbed /workspace /app /repo; do [ -d "$d/.git" ] && echo "$d" && break; done')
          ROOT=${ROOT:-/testbed}
          echo "repo root: $ROOT"
          # gt-index linux binary (build once if missing)
          if [ ! -x gt-index/gt-index-linux ]; then
            (cd gt-index && CGO_ENABLED=1 go build -o gt-index-linux ./cmd/gt-index/) || echo "WARN: gt-index build"
          fi
          mkdir -p /tmp/gt
          docker cp gt-index/gt-index-linux gtsrc:/tmp/gt-index && docker exec gtsrc chmod +x /tmp/gt-index
          docker exec gtsrc /tmp/gt-index -root="$ROOT" -output=/tmp/graph.db 2>&1 | tail -3 || echo "WARN: gt-index run"
          docker cp gtsrc:/tmp/graph.db /tmp/gt/graph.db 2>/dev/null || echo "WARN: no graph.db"
          # extract repo source to the runner — the host-side brief's grep/semantic read files
          mkdir -p /tmp/gt/src && docker cp "gtsrc:$ROOT/." /tmp/gt/src 2>/dev/null || echo "WARN: no source"
          docker rm -f gtsrc 2>/dev/null || true
          # offline LSP precision pass — use the TASK's language (go/ts/js/rust/python)
          if [ -f /tmp/gt/graph.db ]; then
            TASK_LANG=$(python3 -c "import tomllib;t=tomllib.load(open('$TASK_DIR/task.toml','rb'));print(t.get('metadata',{}).get('language','python'))")
            echo "task language: $TASK_LANG -> LSP pass"
            python -m groundtruth.resolve --db /tmp/gt/graph.db --root /tmp/gt/src --resolve --lang "$TASK_LANG" 2>&1 | tail -3 || echo "WARN: lsp"
            echo "lsp edges written: $(sqlite3 /tmp/gt/graph.db "SELECT COUNT(*) FROM edges WHERE resolution_method='lsp'" 2>/dev/null || echo '?')"
            echo "GT_GRAPH_DB=/tmp/gt/graph.db" >> "$GITHUB_ENV"
            echo "GT_REPO_ROOT=/tmp/gt/src" >> "$GITHUB_ENV"
            echo "GT brief WIRED: graph.db $(stat -c%s /tmp/gt/graph.db) bytes, src $(ls /tmp/gt/src | wc -l) entries"
          else
            echo "::warning::graph.db missing — Point A brief will skip (DeepSWE runs hook-only)"
          fi

      - name: Preflight — prove GT is correct + full-potential before the paid run
        if: ${{ env.GT_GRAPH_DB != '' }}
        run: |
          GT_REQUIRE_FULL_POTENTIAL=1 python scripts/verify/preflight_pipeline.py \
            --db /tmp/gt/graph.db --root /tmp/gt/src || \
            echo "::warning::preflight flagged degradation — see checks above (run continues; gate is advisory here)"

      - name: Run GT trial
        run: |
          echo "=== DeepSWE GT Trial ==="
          echo "Task:  ${{ inputs.task_id }}"
          echo "Model: ${{ inputs.model }}"
          echo "GT_GRAPH_DB: ${GT_GRAPH_DB:-<unset -> brief off>}"
          echo ""

          pier run \
            -p deepswe-bench/tasks/${{ inputs.task_id }} \
            --agent-import-path artifact_deepswe.gt_agent:GTMiniSweAgent \
            --model ${{ inputs.model }} \
            --env docker \
            -y \
            --ak config_file=artifact_deepswe/gt_integration/deepswe_gt_pier.yaml \
            2>&1 | tee trial_output.log

          echo ""
          echo "=== Trial complete ==="

      - name: Collect results
        if: always()
        run: |
          mkdir -p trial_results
          cp trial_output.log trial_results/ 2>/dev/null || true
          cp /tmp/gt/graph.db trial_results/graph.db 2>/dev/null || true
          # The EXACT instruction handed to the agent (gt_agent writes this) — the ground
          # truth for brief-reached-agent. NOT a repo filename match.
          cp /tmp/gt/delivered_instruction.txt trial_results/ 2>/dev/null || true

          echo "Collected artifacts:"
          find trial_results -type f | head -20
          echo "=== BRIEF-REACHED-AGENT (from the agent's ACTUAL delivered instruction) ==="
          if [ -f /tmp/gt/delivered_instruction.txt ]; then
            CHARS=$(wc -c < /tmp/gt/delivered_instruction.txt)
            if grep -qE "<gt-task-brief>" /tmp/gt/delivered_instruction.txt; then
              echo "BRIEF_REACHED_AGENT: YES — <gt-task-brief> present in the ${CHARS}-char instruction the agent received"
              echo "--- brief excerpt ---"; sed -n '/<gt-task-brief>/,/<\/gt-task-brief>/p' /tmp/gt/delivered_instruction.txt | head -15
            else
              echo "BRIEF_REACHED_AGENT: NO — instruction exists (${CHARS} chars) but contains no <gt-task-brief> (brief was empty/skipped)"
            fi
          else
            echo "BRIEF_REACHED_AGENT: UNCONFIRMED — gt_agent never wrote delivered_instruction.txt (run() not reached?)"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepswe-gt-trial-${{ inputs.task_id }}
          path: trial_results/
          retention-days: 30
          if-no-files-found: warn
