name: Build gt-index binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: gt-index
            asset: gt-index-linux-amd64
          - os: macos-14
            goos: darwin
            goarch: arm64
            binary: gt-index
            asset: gt-index-darwin-arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            binary: gt-index
            asset: gt-index-darwin-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: gt-index.exe
            asset: gt-index-windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build gt-index
        working-directory: gt-index
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o ${{ matrix.binary }} ./cmd/gt-index/

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: tar czf ${{ matrix.asset }}.tar.gz -C gt-index ${{ matrix.binary }}

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        run: Compress-Archive -Path gt-index/${{ matrix.binary }} -DestinationPath ${{ matrix.asset }}.zip
        shell: pwsh

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}.*
