name: "DeepSWE: Full benchmark (parallel matrix)"

# Runs the WHOLE DeepSWE benchmark in parallel — one task per job, fanned across
# max-parallel runners — instead of the single-task deepswe_trial. Each job is the
# EXACT legitimate per-task flow from deepswe_trial: pull the task image, index the
# base-commit repo FRESH in-container, run the shipped LSP resolve pass, HARD-gate
# the full stack, then run the 300-step GT mini-swe-agent and collect the trajectory.
#
# Legitimacy: no preindex artifacts, no prebuilt graph reuse — every task indexes its
# own repo live (GT_FORBID_PREBUILT_GRAPH=1). Full-stack gates abort a degraded task
# before it spends. Use deepswe_trial for single-task debugging; this for the benchmark.
#
# Parallel-account scaling: a mirror on a second GitHub account runs this concurrently
# on its own runner pool. Both accounts read ONE shared public cache via the assets_repo
# input (default harneet2512/groundtruth) — the GHCR task images + the pipeline-assets-v1
# model release — so neither re-mirrors and the LFS quota is never touched.

on:
  workflow_dispatch:
    inputs:
      model:
        description: "LLM model"
        required: true
        default: "deepseek/deepseek-v4-flash"
      language:
        description: "Language filter (all, python, go, typescript, javascript, rust)"
        required: true
        default: "all"
      max_tasks:
        description: "Max tasks to run (0 = all 113)"
        required: true
        default: "0"
      max_parallel:
        description: "Concurrent jobs (GitHub-hosted runner ceiling ~20 on this plan)"
        required: true
        default: "20"
      assets_repo:
        description: "owner/repo that hosts the shared GHCR image cache + pipeline-assets-v1 release (a mirror on another account points here so both share ONE public cache)"
        required: true
        default: "harneet2512/groundtruth"
      task_ids:
        description: "Explicit comma/space-separated instance_ids (overrides language+max_tasks). Use for the phase-2 language-diverse set. Empty = first-N by language."
        required: false
        default: ""

permissions:
  contents: read
  packages: read

env:
  # Full-stack enforcement (same as deepswe_trial) — no silent fallback on a paid run.
  # MASTER gate: GT_REQUIRE_FULL_STACK=1 implies require-embedder/lsp/fts5 in
  # preflight_pipeline.py; the explicit per-dimension flags are kept for belt-and-braces.
  GT_REQUIRE_FULL_STACK: "1"
  GT_REQUIRE_FULL_POTENTIAL: "1"
  GT_REQUIRE_FTS5: "1"
  GT_FORCE_ONNX_EMBEDDER: "1"
  GT_REQUIRE_EMBEDDER: "1"
  GT_REQUIRE_LSP: "1"
  # Legitimacy: fresh per-task in-container index, never a prebuilt / cross-run graph.db.
  GT_FORBID_PREBUILT_GRAPH: "1"
  # HF must be fully offline: the embedder + dataset come from the baked model / local
  # files only. Any HF network read on a paid run is a degraded-stack signal -> fail.
  HF_DATASETS_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  HF_HUB_OFFLINE: "1"

jobs:
  # ── Stage-0 / prepare: ENV-ONLY. Leaderboard legitimacy. ────────────────────
  # This job builds the TASK MATRIX from the bench clone (dataset metadata) and
  # NOTHING ELSE. It must NOT build graph.db for any benchmark task repo — per-task
  # graphs are built FRESH, in-container, in the `trial` job (GT_FORBID_PREBUILT_GRAPH=1).
  # A prebuilt / cross-job graph would be benchmark-shape leakage. The guard below
  # asserts no graph.db was produced here.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      total: ${{ steps.gen.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Workflow lint — catch CI bug classes before the paid matrix
        shell: bash
        run: |
          # Fail-fast in cheap Stage-0: a bash-ism-under-sh, bare-pip, unguarded
          # dataset fetch, or a swallowed required-op in either official workflow
          # aborts HERE instead of sliding into the paid trial matrix.
          python scripts/verify/workflow_lint.py \
            .github/workflows/deepswe_full.yml \
            .github/actions/setup-eval/action.yml
      - name: Clone deepswe-bench
        run: |
          if [ ! -d "deepswe-bench" ]; then
            git clone --depth 1 https://github.com/datacurve-ai/deep-swe.git deepswe-bench
          fi
      - id: gen
        name: Build task matrix (clone is the source of truth for valid task dirs)
        env:
          INPUT_LANGUAGE: ${{ inputs.language }}
          INPUT_MAX_TASKS: ${{ inputs.max_tasks }}
          INPUT_TASK_IDS: ${{ inputs.task_ids }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys, glob
          try:
              import tomllib
          except ModuleNotFoundError:
              import tomli as tomllib
          lang = os.environ.get("INPUT_LANGUAGE", "all")
          maxt = int(os.environ.get("INPUT_MAX_TASKS", "0"))
          # EXPLICIT task list (phase-2 language-diverse set) overrides language+max_tasks.
          # Each id must be a real task dir, else fail-closed (a typo'd id silently shrinking
          # the matrix would corrupt the gate). Order preserved as given.
          explicit = [x for x in os.environ.get("INPUT_TASK_IDS", "").replace(",", " ").split() if x]
          tasks = []
          if explicit:
              missing = [t for t in explicit if not os.path.isdir(f"deepswe-bench/tasks/{t}")]
              if missing:
                  print(f"FATAL: task_ids not found in clone: {missing}", file=sys.stderr)
                  sys.exit(1)
              tasks = explicit
          else:
              for d in sorted(glob.glob("deepswe-bench/tasks/*")):
                  if not os.path.isdir(d):
                      continue
                  tid = os.path.basename(d)
                  toml = os.path.join(d, "task.toml")
                  if not os.path.exists(toml):
                      continue
                  if lang != "all":
                      try:
                          t = tomllib.load(open(toml, "rb"))
                          if t.get("metadata", {}).get("language", "") != lang:
                              continue
                      except Exception:
                          continue
                  tasks.append(tid)
              if maxt > 0:
                  tasks = tasks[:maxt]
          # GHA matrix cap is 256; DeepSWE is 113, but guard anyway.
          if len(tasks) > 256:
              print(f"WARN: {len(tasks)} tasks > 256 matrix cap; truncating", file=sys.stderr)
              tasks = tasks[:256]
          matrix = {"include": [{"task": t} for t in tasks]}
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"total={len(tasks)}\n")
          print(f"{len(tasks)} tasks queued (lang={lang}, max={maxt})", file=sys.stderr)
          PYEOF

      - name: Legitimacy guard — Stage-0 built NO task graph.db (env-only)
        run: |
          # Fail-closed: if any graph.db materialized in this env-only job, a per-task
          # graph leaked into prepare -> reject (would be benchmark-shape preindexing).
          FOUND=$(find "$GITHUB_WORKSPACE" -name 'graph.db' 2>/dev/null | head -5)
          if [ -n "$FOUND" ]; then
            echo "FATAL: prepare/Stage-0 produced graph.db — must be env/metadata only:"
            echo "$FOUND"
            exit 1
          fi
          echo "legitimacy OK: no graph.db built in Stage-0 (per-task graphs are fresh in-container)"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build + publish gt-index for the agent image (the per-action graph.db source)
        env:
          GH_TOKEN: ${{ secrets.GHCR_PULL_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # ROOT FIX — per-action GT was DARK. The pier AGENT image build curls gt-index from
          # the release to index the repo FRESH in-container -> /tmp/graph.db, which the
          # per-action hooks (gt_mini_patch: contracts/callers/data_flow/consensus) read. The
          # binary was NEVER published, so that curl 404'd, no /tmp/graph.db was built, and
          # every per-action graph query returned nothing. Build the linux binary here ONCE
          # and publish it to the assets release (build-time has full network; the agent image
          # build fetches it). This is the indexer BINARY, not a prebuilt graph — legitimacy
          # (GT_FORBID_PREBUILT_GRAPH) is preserved: each task still indexes itself in-container.
          (cd gt-index && CGO_ENABLED=1 go build -buildvcs=false -tags sqlite_fts5 -o /tmp/gt-index-linux-amd64 ./cmd/gt-index/)
          [ -x /tmp/gt-index-linux-amd64 ] || { echo "FATAL: gt-index build failed"; exit 1; }
          echo "built gt-index-linux-amd64: $(stat -c%s /tmp/gt-index-linux-amd64) bytes"
          for a in 1 2 3; do
            gh release upload pipeline-assets-v1 /tmp/gt-index-linux-amd64 -R "${{ inputs.assets_repo }}" --clobber \
              && { echo "published gt-index-linux-amd64 to ${{ inputs.assets_repo }} (pipeline-assets-v1)"; break; }
            echo "::warning::gt-index upload attempt $a failed — retry"; sleep 8
          done

  trial:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # The container's default shell is sh/dash; our steps use bash-isms (PIPESTATUS,
    # ${!...}). Pin the whole job to bash so fail-closed guards evaluate correctly
    # (the "Bad substitution" / "declare -A" crashes were sh running bash syntax).
    defaults:
      run:
        shell: bash
    # BARE runner (NO container:). pier runs the task env + verifier as sibling containers
    # on the runner's OWN docker, so bind-mount sources resolve on the host — fixing the
    # "bind source path does not exist: .../verifier" that the in-container setup hit (the
    # container saw /__w but the host has /home/runner/work, so sibling containers couldn't
    # find the in-container paths). Bare ubuntu HAS g++/docker/compose/git-lfs; we install
    # pier + go toolchain + gopls + onnxruntime here (the image used to bake them).
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
      max-parallel: ${{ fromJson(inputs.max_parallel) }}
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - name: Checkout GroundTruth
        uses: actions/checkout@v4
        with:
          lfs: false  # LFS QUOTA EXHAUSTED (2026-06-05): the e5 model is fetched from the
                      # pipeline-assets-v1 RELEASE ASSET below (release bandwidth is separate
                      # and unmetered — NOT LFS). lfs:true here now fails the whole job
                      # ("failed to fetch some objects"), as it did on the Live path.

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      # ── TOOLCHAIN CACHE (scalability) ──────────────────────────────────────────
      # The 113-task matrix otherwise reinstalls pier + 4 LSP servers and rebuilds the
      # CGO gt-index binary on EVERY job. Cache the pip wheels, the e5 model, the built
      # gt-index binary, and the LSP server binaries so warm runners skip the heavy
      # reinstall. setup-go@v5 already caches Go modules. All keys are content-hashed
      # (or static-versioned) — never task-specific, so this is benchmark-shape-neutral.
      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: gt-pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: gt-pip-${{ runner.os }}-

      - name: Cache e5 embedder model (shared key with deepswe_trial; survives waves)
        uses: actions/cache@v4
        with:
          path: models/e5-small-v2
          key: gt-embed-e5-small-v2-onnx-v1

      - name: Cache gt-index linux binary (skip CGO rebuild when source unchanged)
        uses: actions/cache@v4
        with:
          path: gt-index/gt-index-linux
          key: gt-index-bin-${{ runner.os }}-${{ hashFiles('gt-index/**/*.go', 'gt-index/go.mod', 'gt-index/go.sum') }}

      - name: Cache LSP server binaries (gopls, rust-analyzer, ts-language-server)
        uses: actions/cache@v4
        with:
          path: ~/.gttools
          key: gt-lsp-tools-${{ runner.os }}-v1

      - name: Fetch e5 model from release (LFS-quota bypass)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "GT_MODELS_ROOT=$PWD/models" >> "$GITHUB_ENV"
          # If the cache restored a real model, skip the download (release bandwidth saved).
          if [ -s models/e5-small-v2/model.onnx ] && [ "$(stat -c%s models/e5-small-v2/model.onnx)" -gt 1000000 ]; then
            echo "e5 model present from cache ($(stat -c%s models/e5-small-v2/model.onnx)B) — skip release fetch"; exit 0
          fi
          REL=pipeline-assets-v1
          mkdir -p models/e5-small-v2
          # The ONE critical model download — retry each asset so a CDN blip never aborts.
          dl() {  # dl <asset> <dest> <min_bytes>
            for ATTEMPT in 1 2 3 4 5; do
              gh release download "$REL" -R "${{ inputs.assets_repo }}" -p "$1" -O "$2" --clobber \
                && [ "$(stat -c%s "$2" 2>/dev/null || echo 0)" -gt "$3" ] && { echo "  $1 ok (attempt $ATTEMPT)"; return 0; }
              echo "::warning::release download $1 attempt $ATTEMPT failed — retrying"; sleep 10
            done
            echo "FATAL: could not fetch release asset $1 after 5 attempts"; return 1
          }
          dl model.onnx models/e5-small-v2/model.onnx 1000000
          dl tokenizer.json models/e5-small-v2/tokenizer.json 1000
          echo "e5 model from release: model=$(stat -c%s models/e5-small-v2/model.onnx)B tokenizer=$(stat -c%s models/e5-small-v2/tokenizer.json)B"

      - name: Install bare-runner eval stack (pier + LSP + onnxruntime; image used to bake these)
        run: |
          set -e
          # Cached toolchain dir (actions/cache restores ~/.gttools above). Put it on PATH
          # for THIS step (the gates below) AND for later steps (resolve/preflight/pier).
          GTBIN="$HOME/.gttools/bin"; mkdir -p "$GTBIN"
          export PATH="$GTBIN:$PATH"; echo "$GTBIN" >> "$GITHUB_PATH"
          python -m pip install --upgrade pip
          python -m pip install datacurve-pier onnxruntime tokenizers huggingface_hub pyright || \
            { echo "FATAL: pier/onnxruntime install failed"; exit 1; }
          # PER-LANGUAGE LSP servers for the Point A host-side `groundtruth.resolve` pass,
          # installed INTO the cached $GTBIN (warm runners skip these via the command -v
          # guard). language=all can pull go/rust/ts/js tasks; without their server the host
          # LSP resolve fails-closed (correct, but wastes the slot). Best-effort per server
          # so a transient flake on an UNUSED language never fails the whole job — the
          # per-language hard-fail below still aborts if THIS run's server didn't land.
          # Go (gopls):
          command -v gopls >/dev/null || GOBIN="$GTBIN" go install golang.org/x/tools/gopls@latest || echo "WARN: gopls install failed (go tasks will fail-closed)"
          # Rust (rust-analyzer):
          command -v rust-analyzer >/dev/null || (curl -fsSL https://github.com/rust-lang/rust-analyzer/releases/latest/download/rust-analyzer-x86_64-unknown-linux-gnu.gz \
            | gunzip -c > "$GTBIN/rust-analyzer" && chmod +x "$GTBIN/rust-analyzer") || echo "WARN: rust-analyzer install failed (rust tasks will fail-closed)"
          # TS/JS (typescript-language-server): npm prefix -> $HOME/.gttools so the binary
          # lands in the cached $GTBIN (no sudo, no global system dir).
          if ! command -v typescript-language-server >/dev/null; then
            (command -v npm >/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq nodejs npm)) \
              && npm config set prefix "$HOME/.gttools" \
              && npm install -g typescript typescript-language-server >/dev/null 2>&1 \
              || echo "WARN: typescript-language-server install failed (ts/js tasks will fail-closed)"
          fi
          command -v pier >/dev/null || { echo "FATAL: pier not on PATH after install"; exit 1; }
          echo "bare-runner eval stack ready: pier=$(command -v pier) gopls=$(command -v gopls) rust-analyzer=$(command -v rust-analyzer) tsserver=$(command -v typescript-language-server) g++=$(command -v g++)"
          # #7 NO SILENT FAILURE on the run's REQUIRED language server. The best-effort installs
          # above tolerate a transient flake on an UNUSED language; but if the server for the
          # language THIS run targets is absent, ABORT (don't silently fail-closed every task).
          # 'all' loudly lists any absent server so a systematically-missing one is visible.
          LANG="${{ inputs.language }}"
          case "$LANG" in
            go) command -v gopls >/dev/null || { echo "FATAL: language=go but gopls absent"; exit 1; } ;;
            rust) command -v rust-analyzer >/dev/null || { echo "FATAL: language=rust but rust-analyzer absent"; exit 1; } ;;
            typescript|javascript) command -v typescript-language-server >/dev/null || { echo "FATAL: language=$LANG but typescript-language-server absent"; exit 1; } ;;
            python) (command -v pyright >/dev/null || python -m pyright --version >/dev/null 2>&1) || { echo "FATAL: language=python but pyright absent"; exit 1; } ;;
          esac
          for s in gopls rust-analyzer typescript-language-server; do command -v "$s" >/dev/null || echo "::warning::LSP server $s ABSENT — $s-language tasks will fail-closed"; done

      - name: Trust the workspace for git (CI checkout uid mismatch)
        run: |
          git config --global --add safe.directory '*' || true
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true

      - name: Mark job-start epoch (legitimacy freshness baseline)
        run: |
          # Any GT artifact (graph.db, brief, closure) with an mtime BEFORE this is
          # carried over from an earlier run and is illegitimate. The legitimacy
          # guard uses GT_JOB_STARTED as the fresh-build cut-off.
          echo "GT_JOB_STARTED=$(date +%s)" >> "$GITHUB_ENV"

      - name: Verify env armed (fail-closed — abort before any paid work)
        shell: bash
        run: |
          set -e
          # Each var MUST be present and == 1. A missing/overridden flag silently
          # re-enables a degraded fallback -> fail immediately. POSIX-safe (no bash
          # arrays) AND pinned to bash so it runs under sh-default container jobs too.
          BAD=0
          for k in GT_REQUIRE_FTS5 GT_REQUIRE_EMBEDDER GT_FORCE_ONNX_EMBEDDER \
                   GT_REQUIRE_LSP GT_REQUIRE_FULL_STACK GT_FORBID_PREBUILT_GRAPH \
                   HF_DATASETS_OFFLINE TRANSFORMERS_OFFLINE HF_HUB_OFFLINE; do
            v=$(printenv "$k" || true)
            if [ "$v" = "1" ]; then echo "  $k=1 OK"; else echo "FATAL: env $k='$v' expected '1' — fail-closed gate"; BAD=1; fi
          done
          [ "$BAD" -eq 0 ] || { echo "FATAL: fail-closed env not armed"; exit 1; }
          echo "=== fail-closed env ARMED ==="

      - name: Install docker CLI (socket is mounted, CLI binary not baked)
        run: |
          # The container mounts /var/run/docker.sock but the baked image lacks the
          # docker CLI -> "Unable to locate executable file: docker" on GHCR login +
          # pier --env docker. Install the client best-effort.
          # docker CLI is REQUIRED (GHCR login + pier --env docker + task image pulls).
          # A true absence must fail the job — never run degraded.
          # apt-get install of docker.io kept failing in this container; use the STATIC
          # docker CLI binary (no apt, just curl which is baked) — reliable everywhere.
          if ! command -v docker >/dev/null; then
            echo "docker CLI absent — fetching static client binary"
            DVER=27.3.1
            curl -fsSL "https://download.docker.com/linux/static/stable/x86_64/docker-${DVER}.tgz" -o /tmp/docker.tgz \
              && tar -xzf /tmp/docker.tgz -C /tmp \
              && cp /tmp/docker/docker /usr/local/bin/docker \
              && chmod +x /usr/local/bin/docker \
              || (apt-get update -qq && apt-get install -y -qq docker.io) \
              || { echo "FATAL: docker CLI missing and static+apt install failed"; exit 1; }
          fi
          docker --version 2>&1 | head -1 || { echo "FATAL: docker CLI still missing"; exit 1; }
          # pier uses `docker compose` (v2 plugin) — the static client + docker.io DON'T
          # include it ("unknown flag: --project-name" => compose subcommand absent).
          # Install the compose v2 plugin binary into the CLI-plugins dir.
          if ! docker compose version >/dev/null 2>&1; then
            echo "docker compose plugin absent — installing v2 plugin"
            mkdir -p /usr/local/lib/docker/cli-plugins
            curl -fsSL "https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-x86_64" \
              -o /usr/local/lib/docker/cli-plugins/docker-compose \
              && chmod +x /usr/local/lib/docker/cli-plugins/docker-compose \
              || { echo "FATAL: docker compose plugin install failed"; exit 1; }
          fi
          docker compose version 2>&1 | head -1 || { echo "FATAL: docker compose still missing"; exit 1; }

      - name: Current GT over baked deps + rebuild gt-index (no re-install of the toolchain)
        run: |
          # Everything heavy is baked into the image. Install ONLY the current checkout's
          # GT (deps already present -> fast) and rebuild gt-index from this source (FTS5).
          python -m pip install -e .   # wheels served from the cached ~/.cache/pip above
          # e5 embedder model is fetched from the pipeline-assets-v1 release earlier in the
          # job (LFS-quota bypass); GT_MODELS_ROOT is exported there. Verify it landed —
          # fail fast HERE (cheap) instead of at the semantic preflight gate downstream.
          if [ -s models/e5-small-v2/model.onnx ] && [ "$(stat -c%s models/e5-small-v2/model.onnx)" -gt 1000000 ]; then
            echo "  e5 model present: $(stat -c%s models/e5-small-v2/model.onnx)b"
          else
            echo "FATAL: e5 model missing/pointer after release fetch — refusing degraded run"; exit 1
          fi
          # go-tree-sitter ocaml/yaml grammars compile C++ via CGO -> need g++ (the baked
          # image ships gcc but not g++): "exec: g++: executable file not found".
          # g++ is REQUIRED for the gt-index CGO build — a true absence must fail the job.
          command -v g++ >/dev/null \
            || (sudo apt-get update -qq && sudo apt-get install -y -qq g++) \
            || (apt-get update -qq && apt-get install -y -qq g++) \
            || { echo "FATAL: g++ missing and install failed (required for gt-index CGO build)"; exit 1; }
          if [ -x gt-index/gt-index-linux ]; then
            echo "gt-index-linux restored from cache — skip CGO rebuild"
          else
            (cd gt-index && CGO_ENABLED=1 go build -buildvcs=false -tags sqlite_fts5 -o gt-index-linux ./cmd/gt-index/ && chmod +x gt-index-linux)
          fi
          # CRITICAL: the image bakes a STALE GT at /opt/groundtruth and sets PYTHONPATH
          # there. Override PYTHONPATH to THIS checkout so the run uses CURRENT code (the
          # legitimacy + gate fixes), not the baked snapshot. GT_MODELS_ROOT (image ENV)
          # still points the embedder at the baked e5 model — no per-run HF download.
          echo "PYTHONPATH=$GITHUB_WORKSPACE/src:$GITHUB_WORKSPACE/scripts/swebench" >> "$GITHUB_ENV"
          echo "=== baked toolchain present? (preflight hard-fails any real gap) ==="
          for s in pyright-langserver gopls rust-analyzer typescript-language-server rg pier sqlite3 docker; do command -v "$s" >/dev/null && echo "  $s OK" || echo "  $s MISSING"; done

      - name: Log in to GHCR for the shared image cache (token-aware, cross-account)
        env:
          # On a MIRROR account, GHCR_PULL_TOKEN = the assets_repo owner's packages token
          # (read:packages) so we pull their PRIVATE shared cache without making it public
          # (no API exists to flip user-package visibility). On the OWNER account the secret
          # is absent -> fall back to the job's own GITHUB_TOKEN (reads its own packages).
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          OWNER=$(echo "${{ inputs.assets_repo }}" | cut -d/ -f1 | tr '[:upper:]' '[:lower:]')
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$OWNER" --password-stdin
          echo "GHCR login OK as $OWNER (cache: ghcr.io/$OWNER/swe-bench-202605)"

      - name: Clone deepswe-bench
        run: |
          if [ ! -d "deepswe-bench" ]; then
            git clone --depth 1 https://github.com/datacurve-ai/deep-swe.git deepswe-bench
          fi

      - name: Validate task exists
        run: |
          TASK_DIR="deepswe-bench/tasks/${{ matrix.task }}"
          if [ ! -d "$TASK_DIR" ]; then
            echo "::error::Task directory not found: $TASK_DIR"; exit 1
          fi
          echo "Task directory: $TASK_DIR"

      - name: Build graph.db + extract source, wire the brief (Point A)
        run: |
          set -e
          TASK_DIR="deepswe-bench/tasks/${{ matrix.task }}"
          IMG=$(python3 -c "import tomllib;t=tomllib.load(open('$TASK_DIR/task.toml','rb'));print(t.get('environment',{}).get('docker_image',''))")
          [ -z "$IMG" ] && { echo "::warning::no docker_image in task.toml — brief stays off"; exit 0; }
          echo "task image: $IMG"
          # GHCR-FIRST pull (cache_deepswe_images.yml mirrors the ECR Public images to
          # GHCR to kill cold-pull latency + ECR rate limits). Retag to $IMG so the rest
          # of the script is unchanged. Fall back to ECR Public with retries.
          OWNER=$(echo "${{ inputs.assets_repo }}" | cut -d/ -f1 | tr '[:upper:]' '[:lower:]')
          BASE="${IMG##*/}"; BASE="${BASE%%:*}"; GHCR="ghcr.io/${OWNER}/${BASE}:${IMG##*:}"
          if docker pull "$GHCR" 2>/dev/null; then
            docker tag "$GHCR" "$IMG"; echo "pulled from GHCR cache: $GHCR"
          else
            echo "GHCR miss ($GHCR) — pulling source"
            for i in 1 2 3 4; do docker pull "$IMG" && break || { echo "pull attempt $i failed, retrying..."; sleep 15; }; done
          fi
          docker image inspect "$IMG" >/dev/null 2>&1 || { echo "::warning::image pull failed — brief stays off"; exit 0; }
          docker rm -f gtsrc 2>/dev/null || true
          docker run -d --name gtsrc "$IMG" sleep 1800 >/dev/null
          ROOT=$(docker exec gtsrc bash -c 'for d in /home/user /testbed /workspace /app /repo; do [ -d "$d/.git" ] && echo "$d" && break; done')
          ROOT=${ROOT:-/testbed}
          echo "repo root: $ROOT"
          if [ ! -x gt-index/gt-index-linux ]; then
            # Fail-closed: a gt-index build failure must abort the task, not run degraded.
            (cd gt-index && CGO_ENABLED=1 go build -buildvcs=false -tags sqlite_fts5 -o gt-index-linux ./cmd/gt-index/) \
              || { echo "FATAL: gt-index build failed"; exit 1; }
          fi
          mkdir -p /tmp/gt
          docker cp gt-index/gt-index-linux gtsrc:/tmp/gt-index && docker exec gtsrc chmod +x /tmp/gt-index
          # Fail-closed: the FRESH in-container index is the legitimacy backbone. If it
          # fails, abort — never fall back to a stale / partial graph.
          docker exec gtsrc /tmp/gt-index -root="$ROOT" -output=/tmp/graph.db 2>&1 | tail -3
          IDX_RC=${PIPESTATUS[0]}
          [ "$IDX_RC" -eq 0 ] || { echo "FATAL: gt-index run failed (rc=$IDX_RC)"; exit 1; }
          docker exec gtsrc test -f /tmp/graph.db || { echo "FATAL: graph.db not produced by in-container index"; exit 1; }
          TASK_LANG=$(python3 -c "import tomllib;t=tomllib.load(open('$TASK_DIR/task.toml','rb'));print(t.get('metadata',{}).get('language','python'))")
          echo "task language: $TASK_LANG -> IN-CONTAINER LSP resolve"
          # ── IN-CONTAINER LSP RESOLVE (language-agnostic, fail-closed) ──────────────
          # gopls/rust-analyzer/tsserver/pyright answer textDocument/definition ONLY in a
          # BUILT workspace (resolved deps / module cache / node_modules). Host-side on
          # extracted source promoted 0 edges (176 gopls failures on Go) — the whole LSP
          # precision layer was a silent no-op for compiled langs. Fix: run the SHIPPED
          # resolve INSIDE the task container, where $ROOT is the built repo. resolve.py is
          # UNCHANGED (it uses --root for both URIs and file reads -> consistent in-place);
          # we only provision its runtime: python3 + pydantic/structlog + the pkg + server.
          docker exec gtsrc bash -lc 'command -v python3 >/dev/null || (apt-get update -qq && apt-get install -y -qq python3 python3-pip) || (apk add --no-cache python3 py3-pip) || true'
          docker exec gtsrc bash -lc 'command -v python3 >/dev/null' || { echo "FATAL: python3 unavailable in container — cannot run in-container LSP"; exit 1; }
          docker exec gtsrc bash -lc 'python3 -m pip --version >/dev/null 2>&1 || python3 -m ensurepip >/dev/null 2>&1 || true'
          docker exec gtsrc bash -lc 'python3 -c "import pydantic" 2>/dev/null || python3 -m pip install -q --disable-pip-version-check pydantic structlog' \
            || { echo "FATAL: could not provide pydantic/structlog in container for resolve.py"; exit 1; }
          docker exec gtsrc mkdir -p /opt/gtsrc
          docker cp src/groundtruth gtsrc:/opt/gtsrc/groundtruth
          # per-language LSP server INTO the container: static host binaries for go/rust;
          # node/pip servers via the image's own toolchain for ts/js/python.
          case "$TASK_LANG" in
            go)   docker cp "$(command -v gopls)" gtsrc:/usr/local/bin/gopls && docker exec gtsrc chmod +x /usr/local/bin/gopls ;;
            rust) docker cp "$(readlink -f "$(command -v rust-analyzer)")" gtsrc:/usr/local/bin/rust-analyzer && docker exec gtsrc chmod +x /usr/local/bin/rust-analyzer ;;
            typescript|javascript) docker exec gtsrc bash -lc 'command -v typescript-language-server >/dev/null || npm install -g typescript typescript-language-server >/dev/null 2>&1' || echo "WARN: tsserver in-container install failed" ;;
            python) docker exec gtsrc bash -lc 'command -v pyright-langserver >/dev/null || python3 -m pip install -q pyright >/dev/null 2>&1' || echo "WARN: pyright in-container install failed" ;;
          esac
          # WORKSPACE WARM (rust): rust-analyzer answers textDocument/definition only after
          # `cargo metadata` builds the crate graph. The boa run got 0 edges because the
          # server was still cold when the resolve queried it (now also gated by the
          # quiescence-wait + procMacro/buildScripts-off init options). Pre-run cargo metadata
          # so the crate graph is built before rust-analyzer starts. Best-effort: if cargo is
          # absent/offline, rust-analyzer still tries (and may fail-close honestly).
          case "$TASK_LANG" in
            rust) docker exec gtsrc bash -lc "cd '$ROOT' && command -v cargo >/dev/null && timeout 240 cargo metadata --format-version=1 >/dev/null 2>&1 && echo 'cargo metadata warmed — rust-analyzer can load the crate graph' || echo '::warning::cargo metadata unavailable — rust-analyzer may still 0-resolve'" ;;
          esac
          # Run the resolve IN-container against the BUILT repo; the enriched graph.db stays
          # at /tmp/graph.db in the container. Fail-closed on a non-zero resolve exit.
          docker exec -e PYTHONPATH=/opt/gtsrc gtsrc bash -lc "cd '$ROOT' && python3 -m groundtruth.resolve --db /tmp/graph.db --root '$ROOT' --resolve --lang '$TASK_LANG'" 2>&1 | tail -6
          RES_RC=${PIPESTATUS[0]}
          [ "$RES_RC" -eq 0 ] || { echo "FATAL: in-container LSP resolve failed (rc=$RES_RC)"; exit 1; }
          mkdir -p /tmp/gt
          docker cp gtsrc:/tmp/graph.db /tmp/gt/graph.db || { echo "FATAL: enriched graph.db not copied out"; exit 1; }
          mkdir -p /tmp/gt/src && docker cp "gtsrc:$ROOT/." /tmp/gt/src 2>/dev/null || echo "WARN: no source"
          docker rm -f gtsrc 2>/dev/null || true
          # FAIL-CLOSED for EVERY language: LSP is critical, not an add-on. 0 lsp-resolved
          # edges means the server could not load the workspace -> abort, never pass a
          # name_match-only graph off as LSP-enriched. (Removes the old accept-0-for-go.)
          LSP_EDGES=$(python3 -c "import sqlite3;print(sqlite3.connect('/tmp/gt/graph.db').execute(\"SELECT COUNT(*) FROM edges WHERE resolution_method='lsp'\").fetchone()[0])" 2>/dev/null || echo 0)
          echo "lsp-promoted edges: $LSP_EDGES"
          [ "${LSP_EDGES:-0}" -gt 0 ] || { echo "FATAL: 0 LSP-resolved edges ($TASK_LANG) — LSP enrichment degraded, refusing degraded run"; exit 1; }
          # rebuild the transitive-closure sidecar AFTER LSP (host gt-index on enriched db).
          gt-index/gt-index-linux -rebuild-closure -output=/tmp/gt/graph.db 2>&1 | tail -2
          CLO_RC=${PIPESTATUS[0]}
          [ "$CLO_RC" -eq 0 ] || { echo "FATAL: closure rebuild after LSP failed (rc=$CLO_RC)"; exit 1; }
          echo "GT_GRAPH_DB=/tmp/gt/graph.db" >> "$GITHUB_ENV"
          echo "GT_REPO_ROOT=/tmp/gt/src" >> "$GITHUB_ENV"
          echo "GT brief WIRED: graph.db $(stat -c%s /tmp/gt/graph.db) bytes, src $(ls /tmp/gt/src | wc -l) entries, lsp_edges=$LSP_EDGES"

      - name: Preflight — HARD gate full stack before the paid run (abort on degradation)
        if: ${{ env.GT_GRAPH_DB != '' }}
        run: |
          # No silent fallback. preflight_pipeline.py exits non-zero under
          # GT_REQUIRE_FULL_POTENTIAL when FTS5 / semantic / lsp-edges / data_flow degrade.
          # --census: the authoritative "GT runs as built" gate — full build census
          # (9 tables, edge trust model, cross-language property kinds, closure) + an
          # end-to-end pipeline run (graph-backed brief + real per-view hook content),
          # coordinated with gt_gt.md. Aborts if any base or the pipeline is degraded.
          python scripts/verify/preflight_pipeline.py \
            --db /tmp/gt/graph.db --root /tmp/gt/src --census

      - name: Legitimacy manifest + guard (fail-closed before the agent runs)
        if: ${{ env.GT_GRAPH_DB != '' }}
        run: |
          # Emit a provenance manifest AND fail-closed on any illegitimate prebuilt
          # artifact (graph.db / brief / closure older than GT_JOB_STARTED). Exit
          # non-zero -> this step fails -> the agent never starts.
          python scripts/verify/legitimacy.py \
            --task "${{ matrix.task }}" \
            --db /tmp/gt/graph.db \
            --root /tmp/gt/src \
            --out /tmp/gt \
            --job-started "$GT_JOB_STARTED" \
            --dataset-source "task.toml(local)"

      - name: Run GT trial
        env:
          # Point gt_agent at the gt-index binary published in prepare, so the pier AGENT
          # image build curls it and indexes the repo in-container -> /tmp/graph.db (the
          # per-action graph). Set BEFORE pier imports gt_agent so it bakes into the image
          # build. Without this the agent's per-action hooks had no graph and delivered nothing.
          GT_INDEX_URL: "https://github.com/${{ inputs.assets_repo }}/releases/download/pipeline-assets-v1/gt-index-linux-amd64"
          # In-container gt-index path for pier's _setup_gt_drift sub-index (the `gt` shim
          # bakes GT_INDEX_BINARY so compute_delta uses the LOCAL binary, never a runtime
          # download — the egress-blocked failure mode we hit on the live run).
          GT_INDEX_BINARY: "/tmp/gt-index"
          # Arm the mini-swe contract-DELTA pull lever (`gt drift` -> compute_delta).
          GT_DRIFT_ENABLED: "1"
          # Live log stream (parity with the OH workflow): the runner pushes pier's stdout to
          # the user's ngrok SSE tunnel for live watching — no polling. No-op if var unset.
          GT_LOG_RELAY_URL: ${{ vars.GT_LOG_RELAY_URL }}
        run: |
          echo "=== DeepSWE GT Trial: ${{ matrix.task }} (model ${{ inputs.model }}) ==="
          echo "GT_GRAPH_DB: ${GT_GRAPH_DB:-<unset -> brief off>}"
          # Line-buffered (stdbuf) so the live relay streams line-by-line, not in 8KB blocks
          # (the OH live-stream fix). tee keeps the full local log regardless of the relay.
          set +e
          stdbuf -oL -eL pier run \
            -p deepswe-bench/tasks/${{ matrix.task }} \
            --agent-import-path artifact_deepswe.gt_agent:GTMiniSweAgent \
            --model ${{ inputs.model }} \
            --env docker \
            -y \
            --ak config_file=artifact_deepswe/gt_integration/deepswe_gt_pier.yaml \
            2>&1 | stdbuf -oL tee trial_output.log | python -u scripts/log_relay.py
          TRIAL_RC=${PIPESTATUS[0]}
          set -e
          echo "=== Trial complete (rc=$TRIAL_RC) ==="

      - name: Collect results
        if: always()
        run: |
          mkdir -p trial_results
          cp trial_output.log trial_results/ 2>/dev/null || true
          cp /tmp/gt/graph.db trial_results/graph.db 2>/dev/null || true
          cp /tmp/gt/delivered_instruction.txt trial_results/ 2>/dev/null || true
          cp -r jobs trial_results/jobs 2>/dev/null || true
          cp /tmp/gt/*.log              trial_results/ 2>/dev/null || true
          cp /tmp/gt/gt_interactions*.jsonl trial_results/ 2>/dev/null || true
          cp /tmp/gt/gt_hooks*.log      trial_results/ 2>/dev/null || true
          # Deep 8-dp metrics (constitution mandate: token/cost efficiency + per-layer)
          cp /tmp/gt/gt_run_summary*.json /tmp/gt_run_summary_${{ matrix.task }}.json 2>/dev/null || true
          PYTHONPATH=${{ github.workspace }}/src python3 scripts/swebench/gt_deep_metrics.py "${{ matrix.task }}" /tmp/gt --log trial_output.log 2>&1 | tail -2 || echo DEEP_METRICS_WARN
          cp /tmp/gt_deep_metrics_${{ matrix.task }}.json trial_results/ 2>/dev/null || true
          cp /tmp/gt_deep_metrics_${{ matrix.task }}.md   trial_results/ 2>/dev/null || true   # human-readable: steps/tokens/money/GT-delivery
          # Leaderboard-legitimacy provenance manifest (written by the guard step).
          cp /tmp/gt/gt_legitimacy_manifest_*.json trial_results/ 2>/dev/null || true
          python3 scripts/verify/deepswe_outcome.py jobs || echo "WARN: outcome extract failed"
          find trial_results -type f | head -40

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepswe-full-${{ matrix.task }}
          path: trial_results/
          retention-days: 30
          if-no-files-found: warn

  summarize:
    needs: trial
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/all
          pattern: deepswe-full-*
      - name: Aggregate DeepSWE benchmark results
        run: |
          echo "## DeepSWE full benchmark — ${{ needs.prepare.outputs.total }} tasks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          RAN=0; TOTAL=0
          for d in /tmp/all/deepswe-full-*; do
            [ -d "$d" ] || continue
            TOTAL=$((TOTAL+1))
            if grep -rqsE "AGENT_RAN_STEPS|n_agent_steps" "$d" 2>/dev/null; then RAN=$((RAN+1)); fi
          done
          echo "Artifacts collected: $TOTAL  |  agent-ran (steps>0 detected): $RAN" >> $GITHUB_STEP_SUMMARY
          echo "Per-task outcome detail is in scripts/verify/deepswe_outcome.py output inside each artifact." >> $GITHUB_STEP_SUMMARY
