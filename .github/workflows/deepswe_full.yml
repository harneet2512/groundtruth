name: "DeepSWE: Full benchmark (parallel matrix)"

# Runs the WHOLE DeepSWE benchmark in parallel — one task per job, fanned across
# max-parallel runners — instead of the single-task deepswe_trial. Each job is the
# EXACT legitimate per-task flow from deepswe_trial: pull the task image, index the
# base-commit repo FRESH in-container, run the shipped LSP resolve pass, HARD-gate
# the full stack, then run the 300-step GT mini-swe-agent and collect the trajectory.
#
# Legitimacy: no preindex artifacts, no prebuilt graph reuse — every task indexes its
# own repo live (GT_FORBID_PREBUILT_GRAPH=1). Full-stack gates abort a degraded task
# before it spends. Use deepswe_trial for single-task debugging; this for the benchmark.
#
# Parallel-account scaling: a mirror on a second GitHub account runs this concurrently
# on its own runner pool. Both accounts read ONE shared public cache via the assets_repo
# input (default harneet2512/groundtruth) — the GHCR task images + the pipeline-assets-v1
# model release — so neither re-mirrors and the LFS quota is never touched.

on:
  workflow_dispatch:
    inputs:
      model:
        description: "LLM model"
        required: true
        default: "deepseek/deepseek-v4-flash"
      language:
        description: "Language filter (all, python, go, typescript, javascript, rust)"
        required: true
        default: "all"
      max_tasks:
        description: "Max tasks to run (0 = all 113)"
        required: true
        default: "0"
      max_parallel:
        description: "Concurrent jobs (GitHub-hosted runner ceiling ~20 on this plan)"
        required: true
        default: "20"
      assets_repo:
        description: "owner/repo that hosts the shared GHCR image cache + pipeline-assets-v1 release (a mirror on another account points here so both share ONE public cache)"
        required: true
        default: "harneet2512/groundtruth"
      gt_substrate_digest:
        description: "Pinned GT substrate image by IMMUTABLE digest (ghcr.io/<org>/gt-substrate@sha256:<digest>). Overrides vars.GT_SUBSTRATE_DIGEST. Proof input — never a mutable tag."
        required: false
        default: ""
      require_pinned_substrate:
        description: "Fail-closed if no pinned digest is set (1 = enforce the substrate-consume proof path; 0 = transitional warn-and-skip). Default 1 per the handoff hard rule."
        required: true
        default: "1"

permissions:
  contents: read
  packages: read

env:
  # Full-stack enforcement (same as deepswe_trial) — no silent fallback on a paid run.
  # MASTER gate: GT_REQUIRE_FULL_STACK=1 implies require-embedder/lsp/fts5 in
  # preflight_pipeline.py; the explicit per-dimension flags are kept for belt-and-braces.
  GT_REQUIRE_FULL_STACK: "1"
  GT_REQUIRE_FULL_POTENTIAL: "1"
  GT_REQUIRE_FTS5: "1"
  GT_FORCE_ONNX_EMBEDDER: "1"
  GT_REQUIRE_EMBEDDER: "1"
  GT_REQUIRE_LSP: "1"
  # Legitimacy: the per-task graph must be built FRESH from THIS task's repo — never a
  # cross-run / stale / out-of-repo prebuilt graph.db. In substrate-consume mode the graph
  # the substrate emits to /gt_artifacts FROM the mounted /work:ro IS that fresh per-task
  # graph (built inside the pinned image, this task, this commit); the adapter consumes it
  # read-only. This flag forbids a STALE/cross-run injection, not the legitimate substrate
  # handoff (proof.py HOST_HANDOFF; same reconciliation as the OH wrapper freshness check).
  GT_FORBID_PREBUILT_GRAPH: "1"
  # HF must be fully offline: the embedder + dataset come from the baked model / local
  # files only. Any HF network read on a paid run is a degraded-stack signal -> fail.
  HF_DATASETS_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  HF_HUB_OFFLINE: "1"
  # ── SUBSTRATE-CONSUME (handoff §A/§B-AFTER/§D/§G) ───────────────────────────
  # The GT proof runtime is a PINNED, portable substrate image (Option B). It is
  # referenced by IMMUTABLE DIGEST, never a mutable tag (§F.1). gt-run-proof runs
  # INSIDE that image with the task repo mounted /work:ro and emits the 8 artifacts
  # (incl. brief.txt) to /gt_artifacts; the DeepSWE adapter CONSUMES them read-only
  # and NEVER rebuilds.
  GT_SUBSTRATE_DIGEST: ${{ inputs.gt_substrate_digest || vars.GT_SUBSTRATE_DIGEST }}
  # Fail-closed digest pin (§E GT_SUBSTRATE_DIGEST_MISSING / PROOF_RUNTIME_FALLBACK_FORBIDDEN):
  # with this =1 a run with no pinned digest ABORTS (no host fallback, no per-task provisioning).
  GT_REQUIRE_PINNED_SUBSTRATE: ${{ inputs.require_pinned_substrate }}
  # Gates policy (P1-f decision: STRICT proof default). gt-run-proof's foundational gates
  # ARE the proof contract on this pipeline — deliver-always there converts a gate failure
  # into a green zero-run (the P0.1 chain), and unlike the OH live-agent workflows there is
  # no separate agent-path consumer of this flag here (it is not forwarded via --ae). So the
  # proof container is strict by DEFAULT ("0"); deliver-always is an EXPLICIT opt-in (set
  # this to "1" deliberately). The OH workflows keep their own explicit "1" (agent path).
  GT_GATES_DELIVER_ALWAYS: "0"
  # Proof env for the AGENT path (hook validation in-container): the adapter consumes the
  # substrate certs and validates the in-container graph reads against the resolved graph.
  GT_PROOF_MODE: "1"
  GT_CONTAINERIZED: "1"
  GT_RUNTIME_STRATEGY: "unified_substrate"

jobs:
  # ── Stage-0 / prepare: ENV-ONLY. Leaderboard legitimacy. ────────────────────
  # This job builds the TASK MATRIX from the bench clone (dataset metadata) and
  # NOTHING ELSE. It must NOT build graph.db for any benchmark task repo — per-task
  # graphs are built FRESH, in-container, in the `trial` job (GT_FORBID_PREBUILT_GRAPH=1).
  # A prebuilt / cross-job graph would be benchmark-shape leakage. The guard below
  # asserts no graph.db was produced here.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      total: ${{ steps.gen.outputs.total }}
      bench_sha: ${{ steps.bench_clone.outputs.bench_sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Workflow lint — catch CI bug classes before the paid matrix
        shell: bash
        run: |
          # Fail-fast in cheap Stage-0: a bash-ism-under-sh, bare-pip, unguarded
          # dataset fetch, or a swallowed required-op in either official workflow
          # aborts HERE instead of sliding into the paid trial matrix.
          python scripts/verify/workflow_lint.py \
            .github/workflows/deepswe_full.yml \
            .github/actions/setup-eval/action.yml
      - name: Clone deepswe-bench
        id: bench_clone
        run: |
          if [ ! -d "deepswe-bench" ]; then
            git clone --depth 1 https://github.com/datacurve-ai/deep-swe.git deepswe-bench
          fi
          # Run provenance: record WHICH deepswe-bench commit defined this run's task set
          # (a --depth 1 clone of the default branch can drift between runs). Surfaced in
          # the run summary (summarize job) + uploaded per-task (run_provenance.json).
          BENCH_SHA=$(git -C deepswe-bench rev-parse HEAD 2>/dev/null || true)
          echo "bench_sha=${BENCH_SHA}" >> "$GITHUB_OUTPUT"
          echo "deepswe-bench clone SHA: ${BENCH_SHA:-<unknown>}"
      - id: gen
        name: Build task matrix (clone is the source of truth for valid task dirs)
        env:
          INPUT_LANGUAGE: ${{ inputs.language }}
          INPUT_MAX_TASKS: ${{ inputs.max_tasks }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys, glob
          try:
              import tomllib
          except ModuleNotFoundError:
              import tomli as tomllib
          lang = os.environ.get("INPUT_LANGUAGE", "all")
          maxt = int(os.environ.get("INPUT_MAX_TASKS", "0"))
          tasks = []
          for d in sorted(glob.glob("deepswe-bench/tasks/*")):
              if not os.path.isdir(d):
                  continue
              tid = os.path.basename(d)
              toml = os.path.join(d, "task.toml")
              if not os.path.exists(toml):
                  continue
              if lang != "all":
                  try:
                      t = tomllib.load(open(toml, "rb"))
                      if t.get("metadata", {}).get("language", "") != lang:
                          continue
                  except Exception:
                      continue
              tasks.append(tid)
          if maxt > 0:
              tasks = tasks[:maxt]
          # GHA matrix cap is 256; DeepSWE is 113, but guard anyway.
          if len(tasks) > 256:
              print(f"WARN: {len(tasks)} tasks > 256 matrix cap; truncating", file=sys.stderr)
              tasks = tasks[:256]
          matrix = {"include": [{"task": t} for t in tasks]}
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"total={len(tasks)}\n")
          print(f"{len(tasks)} tasks queued (lang={lang}, max={maxt})", file=sys.stderr)
          PYEOF

      - name: Legitimacy guard — Stage-0 built NO task graph.db (env-only)
        run: |
          # Fail-closed: if any graph.db materialized in this env-only job, a per-task
          # graph leaked into prepare -> reject (would be benchmark-shape preindexing).
          FOUND=$(find "$GITHUB_WORKSPACE" -name 'graph.db' 2>/dev/null | head -5)
          if [ -n "$FOUND" ]; then
            echo "FATAL: prepare/Stage-0 produced graph.db — must be env/metadata only:"
            echo "$FOUND"
            exit 1
          fi
          echo "legitimacy OK: no graph.db built in Stage-0 (per-task graphs are fresh in-container)"

  trial:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # The container's default shell is sh/dash; our steps use bash-isms (PIPESTATUS,
    # ${!...}). Pin the whole job to bash so fail-closed guards evaluate correctly
    # (the "Bad substitution" / "declare -A" crashes were sh running bash syntax).
    defaults:
      run:
        shell: bash
    # BARE runner (NO container:). pier runs the task env + verifier as sibling containers
    # on the runner's OWN docker, so bind-mount sources resolve on the host — fixing the
    # "bind source path does not exist: .../verifier" that the in-container setup hit (the
    # container saw /__w but the host has /home/runner/work, so sibling containers couldn't
    # find the in-container paths). Bare ubuntu HAS g++/docker/compose/git-lfs; we install
    # pier + go toolchain + gopls + onnxruntime here (the image used to bake them).
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
      max-parallel: ${{ fromJson(inputs.max_parallel) }}
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - name: Checkout GroundTruth
        uses: actions/checkout@v4
        with:
          lfs: false  # LFS QUOTA EXHAUSTED (2026-06-05): the e5 model is fetched from the
                      # pipeline-assets-v1 RELEASE ASSET below (release bandwidth is separate
                      # and unmetered — NOT LFS). lfs:true here now fails the whole job
                      # ("failed to fetch some objects"), as it did on the Live path.

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── TOOLCHAIN CACHE (scalability) ──────────────────────────────────────────
      # SUBSTRATE-CONSUME: the e5 model, gt-index binary, and LSP servers are all BAKED in
      # the pinned substrate image (handoff §A) — the runner no longer builds/fetches them.
      # The only host-side install is pier + the current GT (for the adapter's imports), so
      # we keep just the pip-wheel cache. Key is content-hashed (pyproject.toml), never
      # task-specific -> benchmark-shape-neutral.
      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: gt-pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: gt-pip-${{ runner.os }}-

      - name: Install host harness deps (pier + GT python deps for the adapter ONLY — NO host LSP)
        run: |
          set -e
          # SUBSTRATE-CONSUME (handoff §B-AFTER + §F.2 "no host GT execution"): LSP/gates/graph
          # build all run INSIDE the pinned substrate. The runner therefore installs ONLY what
          # the HARNESS needs: pier (to run the agent) and the GT python deps the ADAPTER imports
          # host-side (GTRuntimeContext / proof.graph_edges_hash for the §H witness, and the brief
          # fallback). NO gopls/rust-analyzer/tsserver/pyright on the runner — host LSP is exactly
          # the §B BEFORE/invalid host-split this change removes.
          python -m pip install --upgrade pip
          # PINNED: the whole --ae/--mounts-json env+mount integration was source-verified
          # against pier 0.2.0 (cli/jobs.py:620,629 -> factory extra_env -> DockerEnvironment
          # exec -e). An unpinned install lets an upstream release silently change that
          # plumbing mid-run — never float the harness contract on a paid matrix.
          python -m pip install "datacurve-pier==0.2.0" || { echo "FATAL: pier install failed"; exit 1; }
          command -v pier >/dev/null || { echo "FATAL: pier not on PATH after install"; exit 1; }
          echo "host harness ready: pier=$(command -v pier) (LSP/gates/graph run inside the substrate)"

      - name: Trust the workspace for git (CI checkout uid mismatch)
        run: |
          git config --global --add safe.directory '*' || true
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true

      - name: Mark job-start epoch (legitimacy freshness baseline)
        run: |
          # Any GT artifact (graph.db, brief, closure) with an mtime BEFORE this is
          # carried over from an earlier run and is illegitimate. The legitimacy
          # guard uses GT_JOB_STARTED as the fresh-build cut-off.
          echo "GT_JOB_STARTED=$(date +%s)" >> "$GITHUB_ENV"

      - name: Verify env armed (fail-closed — abort before any paid work)
        shell: bash
        run: |
          set -e
          # Each var MUST be present and == 1. A missing/overridden flag silently
          # re-enables a degraded fallback -> fail immediately. POSIX-safe (no bash
          # arrays) AND pinned to bash so it runs under sh-default container jobs too.
          BAD=0
          for k in GT_REQUIRE_FTS5 GT_REQUIRE_EMBEDDER GT_FORCE_ONNX_EMBEDDER \
                   GT_REQUIRE_LSP GT_REQUIRE_FULL_STACK GT_FORBID_PREBUILT_GRAPH \
                   HF_DATASETS_OFFLINE TRANSFORMERS_OFFLINE HF_HUB_OFFLINE; do
            v=$(printenv "$k" || true)
            if [ "$v" = "1" ]; then echo "  $k=1 OK"; else echo "FATAL: env $k='$v' expected '1' — fail-closed gate"; BAD=1; fi
          done
          [ "$BAD" -eq 0 ] || { echo "FATAL: fail-closed env not armed"; exit 1; }
          echo "=== fail-closed env ARMED ==="

      - name: Install docker CLI (socket is mounted, CLI binary not baked)
        run: |
          # The container mounts /var/run/docker.sock but the baked image lacks the
          # docker CLI -> "Unable to locate executable file: docker" on GHCR login +
          # pier --env docker. Install the client best-effort.
          # docker CLI is REQUIRED (GHCR login + pier --env docker + task image pulls).
          # A true absence must fail the job — never run degraded.
          # apt-get install of docker.io kept failing in this container; use the STATIC
          # docker CLI binary (no apt, just curl which is baked) — reliable everywhere.
          if ! command -v docker >/dev/null; then
            echo "docker CLI absent — fetching static client binary"
            DVER=27.3.1
            curl -fsSL "https://download.docker.com/linux/static/stable/x86_64/docker-${DVER}.tgz" -o /tmp/docker.tgz \
              && tar -xzf /tmp/docker.tgz -C /tmp \
              && cp /tmp/docker/docker /usr/local/bin/docker \
              && chmod +x /usr/local/bin/docker \
              || (apt-get update -qq && apt-get install -y -qq docker.io) \
              || { echo "FATAL: docker CLI missing and static+apt install failed"; exit 1; }
          fi
          docker --version 2>&1 | head -1 || { echo "FATAL: docker CLI still missing"; exit 1; }
          # pier uses `docker compose` (v2 plugin) — the static client + docker.io DON'T
          # include it ("unknown flag: --project-name" => compose subcommand absent).
          # Install the compose v2 plugin binary into the CLI-plugins dir.
          if ! docker compose version >/dev/null 2>&1; then
            echo "docker compose plugin absent — installing v2 plugin"
            mkdir -p /usr/local/lib/docker/cli-plugins
            curl -fsSL "https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-x86_64" \
              -o /usr/local/lib/docker/cli-plugins/docker-compose \
              && chmod +x /usr/local/lib/docker/cli-plugins/docker-compose \
              || { echo "FATAL: docker compose plugin install failed"; exit 1; }
          fi
          docker compose version 2>&1 | head -1 || { echo "FATAL: docker compose still missing"; exit 1; }

      - name: Install current GT host-side (adapter imports ONLY — no gt-index build, no host LSP)
        run: |
          set -e
          # The graph build / FTS5 / LSP / closure / embedder / gates all run INSIDE the pinned
          # substrate (handoff §F.2/§F.3/§F.4 — no host GT execution, no per-task pip into the
          # task image, no host gt-index build). Host-side we install ONLY the current checkout's
          # GT so the DeepSWE adapter can import groundtruth.runtime (GTRuntimeContext +
          # proof.graph_edges_hash) for the §H witness and the brief fallback.
          python -m pip install -e .
          # PYTHONPATH: THIS checkout's src (current adapter/runtime code, not any baked snapshot)
          # + scripts/swebench + scripts/metrics (so the canonical graph_certificate.format_graph_witness
          # the adapter MAY call is importable host-side; the adapter also self-adds it to sys.path).
          echo "PYTHONPATH=$GITHUB_WORKSPACE/src:$GITHUB_WORKSPACE/scripts/swebench:$GITHUB_WORKSPACE/scripts/metrics" >> "$GITHUB_ENV"
          python -c "import groundtruth.runtime.proof as p, groundtruth.runtime.context as c; print('GT runtime importable host-side:', bool(p.graph_edges_hash and c.GTRuntimeContext))"

      - name: Log in to GHCR for the shared image cache (token-aware, cross-account)
        env:
          # On a MIRROR account, GHCR_PULL_TOKEN = the assets_repo owner's packages token
          # (read:packages) so we pull their PRIVATE shared cache without making it public
          # (no API exists to flip user-package visibility). On the OWNER account the secret
          # is absent -> fall back to the job's own GITHUB_TOKEN (reads its own packages).
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          OWNER=$(echo "${{ inputs.assets_repo }}" | cut -d/ -f1 | tr '[:upper:]' '[:lower:]')
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$OWNER" --password-stdin
          echo "GHCR login OK as $OWNER (cache: ghcr.io/$OWNER/swe-bench-202605)"

      - name: Clone deepswe-bench
        run: |
          if [ ! -d "deepswe-bench" ]; then
            git clone --depth 1 https://github.com/datacurve-ai/deep-swe.git deepswe-bench
          fi
          # Run provenance: THIS job's own bench clone SHA (each matrix job clones fresh;
          # a mid-run push to the bench default branch could drift between jobs — record
          # what THIS task actually ran from). Written to run_provenance.json in Collect.
          BENCH_SHA=$(git -C deepswe-bench rev-parse HEAD 2>/dev/null || true)
          echo "GT_DEEPSWE_BENCH_SHA=${BENCH_SHA}" >> "$GITHUB_ENV"
          echo "deepswe-bench clone SHA: ${BENCH_SHA:-<unknown>}"

      - name: Validate task exists
        run: |
          TASK_DIR="deepswe-bench/tasks/${{ matrix.task }}"
          if [ ! -d "$TASK_DIR" ]; then
            echo "::error::Task directory not found: $TASK_DIR"; exit 1
          fi
          echo "Task directory: $TASK_DIR"

      - name: GT substrate proof (handoff §B-AFTER/§D/§G) — pre-agent, pinned, read-only repo
        run: |
          set -e
          # ── SUBSTRATE-CONSUME pattern (mirrors swebench_300task.yml:919-944) ──────────
          # Replaces the OLD host/image split (§B BEFORE/invalid): NO host gt-index build,
          # NO host `groundtruth.resolve` LSP pass, NO host gates. The pinned substrate
          # image runs gt-run-proof INSIDE the container with the task repo mounted /work:ro
          # and emits the 8 artifacts to /gt_artifacts; the agent CONSUMES them read-only.
          TASK_DIR="deepswe-bench/tasks/${{ matrix.task }}"

          # §E GT_SUBSTRATE_DIGEST_MISSING / PROOF_RUNTIME_FALLBACK_FORBIDDEN (fail-closed).
          # G1: every §E marker echo ALSO appends to trial_output.log (tee -a creates it) —
          # this step exits BEFORE the agent step creates the log, and deepswe_outcome.py's
          # INFRA classification scans trial_output.log line-anchored. Without the tee the
          # failure classified UNKNOWN instead of INFRA.
          if [ -z "$GT_SUBSTRATE_DIGEST" ]; then
            if [ "${GT_REQUIRE_PINNED_SUBSTRATE:-1}" = "1" ]; then
              echo "GT_SUBSTRATE_DIGEST_MISSING / PROOF_RUNTIME_FALLBACK_FORBIDDEN: proof/substrate-consume" | tee -a trial_output.log
              echo "mode requires GT_SUBSTRATE_DIGEST (the pinned portable substrate, by @sha256 digest)."
              echo "Host GT execution + per-task provisioning are forbidden. Set the gt_substrate_digest"
              echo "input or the GT_SUBSTRATE_DIGEST repo variable to the published image digest."
              exit 1
            fi
            echo "::warning::GT_SUBSTRATE_DIGEST unset and GT_REQUIRE_PINNED_SUBSTRATE=0 (transitional)"
            echo "::warning::— skipping the substrate proof; the agent runs with the brief OFF (no host GT)."
            exit 0
          fi
          # §F.1 immutable-digest assertion: a mutable tag is NOT a valid proof input.
          case "$GT_SUBSTRATE_DIGEST" in
            *@sha256:*) : ;;
            *) echo "FATAL: GT_SUBSTRATE_DIGEST='$GT_SUBSTRATE_DIGEST' is not a pinned @sha256 digest"; exit 1 ;;
          esac
          echo "pinned substrate: $GT_SUBSTRATE_DIGEST"

          IMG=$(python3 -c "import tomllib;t=tomllib.load(open('$TASK_DIR/task.toml','rb'));print(t.get('environment',{}).get('docker_image',''))")
          [ -z "$IMG" ] && { echo "FATAL: no docker_image in task.toml — cannot materialize the task repo"; exit 1; }
          echo "task image: $IMG"
          # GHCR-FIRST pull (cache_deepswe_images.yml mirrors the source images to GHCR to
          # kill cold-pull latency + rate limits). Retag to $IMG. Fall back with retries.
          OWNER=$(echo "${{ inputs.assets_repo }}" | cut -d/ -f1 | tr '[:upper:]' '[:lower:]')
          BASE="${IMG##*/}"; BASE="${BASE%%:*}"; GHCR="ghcr.io/${OWNER}/${BASE}:${IMG##*:}"
          if docker pull "$GHCR" 2>/dev/null; then
            docker tag "$GHCR" "$IMG"; echo "pulled from GHCR cache: $GHCR"
          else
            echo "GHCR miss ($GHCR) — pulling source"
            PULLED=0
            for i in 1 2 3 4; do docker pull "$IMG" && { PULLED=1; break; } || { echo "pull attempt $i failed, retrying..."; sleep 15; }; done
            # G1: canonical token (deepswe_outcome.INFRA_LOG_MARKERS) — the old
            # "FATAL: task image pull failed" echo could never classify INFRA.
            [ "$PULLED" -eq 1 ] || { echo "TASK_IMAGE_PULL_FAIL: task image pull failed after 4 attempts ($IMG)" | tee -a trial_output.log; exit 1; }
          fi
          docker image inspect "$IMG" >/dev/null 2>&1 || { echo "TASK_IMAGE_PULL_FAIL: task image not present after pull ($IMG)" | tee -a trial_output.log; exit 1; }

          # Pull the PINNED substrate by digest (§E GT_SUBSTRATE_PULL_FAIL).
          if ! docker pull "$GT_SUBSTRATE_DIGEST"; then
            echo "GT_SUBSTRATE_PULL_FAIL: docker pull of the pinned substrate failed" | tee -a trial_output.log; exit 1
          fi

          # Materialize the task repo at its base commit and copy it OUT to a host dir we
          # then mount READ-ONLY into the substrate (the substrate copies to its own writable
          # scratch internally; the task image is never mutated).
          docker rm -f gtsrc 2>/dev/null || true
          docker run -d --name gtsrc "$IMG" sleep 1800 >/dev/null
          ROOT=$(docker exec gtsrc bash -c 'for d in /home/user /testbed /workspace /app /repo; do [ -d "$d/.git" ] && echo "$d" && break; done')
          ROOT=${ROOT:-/testbed}
          echo "repo root: $ROOT"
          rm -rf /tmp/gt && mkdir -p /tmp/gt /tmp/gt/src
          docker cp "gtsrc:$ROOT/." /tmp/gt/src || { echo "FATAL: source extract failed"; exit 1; }

          # Run provenance: the task base commit = the materialized repo's HEAD (docker cp
          # carries .git). Recorded-or-empty — gt-run-proof writes null when absent, never
          # a guess. Provenance only; no task IDs in product logic, no gate behavior change.
          TASK_REPO_COMMIT=$(git -C /tmp/gt/src rev-parse HEAD 2>/dev/null || true)
          echo "task repo commit: ${TASK_REPO_COMMIT:-<unknown>}"

          # THIS task's issue (problem statement only — NEVER gold/tests) so the substrate's
          # demand-driven LSP scope + embedder cert operate on the issue-relevant subgraph.
          # P0.1-a: the real DeepSWE task instruction lives in the sibling instruction.md
          # (pier reads it as Task.instruction) — task.toml has NO metadata.issue/task.prompt,
          # so the old extraction yielded an EMPTY issue on every task (and `|| :` swallowed
          # it), silently degrading the substrate to a no-issue run (the green-zero-run
          # chain). Read instruction.md first, task.toml fields as fallback, and FAIL-CLOSED
          # (GT_ISSUE_MISSING, classified INFRA) if the issue text ends up empty — never run
          # the substrate with an empty issue.
          python3 - "$TASK_DIR" << 'PYEOF' || { echo "GT_ISSUE_MISSING: no issue text for this task — refusing to run the substrate with an EMPTY issue (fail-closed)" | tee -a trial_output.log; exit 1; }
          import os, sys
          try:
              import tomllib
          except ModuleNotFoundError:
              import tomli as tomllib
          task_dir = sys.argv[1]
          out_path = os.environ.get("GT_ISSUE_OUT", "/tmp/issue.txt")
          issue, source = "", ""
          inst = os.path.join(task_dir, "instruction.md")
          if os.path.exists(inst):
              with open(inst, encoding="utf-8", errors="replace") as f:
                  issue = f.read().strip()
              source = "instruction.md"
          if not issue:
              try:
                  with open(os.path.join(task_dir, "task.toml"), "rb") as f:
                      t = tomllib.load(f)
                  issue = ((t.get("metadata", {}) or {}).get("issue", "")
                           or (t.get("task", {}) or {}).get("prompt", "")
                           or (t.get("task", {}) or {}).get("instruction", "") or "").strip()
                  source = "task.toml"
              except Exception:
                  issue = ""
          if not issue:
              print("GT_ISSUE_MISSING: no instruction.md and no task.toml issue/prompt/instruction "
                    "— the substrate must never run with an EMPTY issue (fail-closed)", file=sys.stderr)
              sys.exit(1)
          with open(out_path, "w", encoding="utf-8") as f:
              f.write(issue)
          print(f"issue text: {len(issue)} chars from {source} -> {out_path}")
          PYEOF

          # ── gt-run-proof INSIDE the pinned substrate (the ONE portable command, §A) ──
          # Repo mounted /work:ro; artifacts -> /gt_artifacts. All 8 proof flags set so the
          # substrate fails-closed on any boundary/baked-dep violation. The host only orchestrates.
          if ! docker run --rm \
              -v "/tmp/gt/src:/work:ro" -v "/tmp/gt:/gt_artifacts" \
              -v "/tmp/issue.txt:/work_issue.txt:ro" \
              -e GT_PROOF_MODE=1 -e GT_CONTAINERIZED=1 -e GT_RUNTIME_STRATEGY=unified_substrate \
              -e GT_REQUIRE_FTS5=1 -e GT_REQUIRE_EMBEDDER=1 -e GT_FORCE_ONNX_EMBEDDER=1 \
              -e GT_REQUIRE_LSP=1 -e GT_REQUIRE_FULL_STACK=1 -e GT_ISSUE_FILE=/work_issue.txt \
              -e GT_GATES_DELIVER_ALWAYS="${GT_GATES_DELIVER_ALWAYS:-0}" \
              -e GT_GIT_COMMIT="${{ github.sha }}" \
              -e GT_SUBSTRATE_DIGEST="$GT_SUBSTRATE_DIGEST" \
              -e GT_TASK_REPO_COMMIT="$TASK_REPO_COMMIT" \
              "$GT_SUBSTRATE_DIGEST" gt-run-proof --source-root /work --out /gt_artifacts; then
            echo "GT_RUN_PROOF_FAIL: gt-run-proof returned non-zero (boundary/leak/missing-baked-dep)" | tee -a trial_output.log
            docker rm -f gtsrc 2>/dev/null || true
            exit 1
          fi
          docker rm -f gtsrc 2>/dev/null || true

          # §E GT_ARTIFACT_MISSING / SUBSTRATE_MISSING_CERTS — verify the 8-artifact contract.
          # brief.txt INCLUDED (P0.1-c): the agent consumes /gt_artifacts/brief.txt read-only;
          # in proof mode an empty/missing brief is GT_ARTIFACT_MISSING, never a WARN (there
          # is no host fallback — host run_v74 is fail-closed by the container boundary).
          for c in graph.db runtime_context.json lsp_certificate.json graph_certificate.json \
                   embedder_certificate.json foundational_gate_report.json run_manifest.json \
                   brief.txt; do
            test -s "/tmp/gt/$c" || { echo "GT_ARTIFACT_MISSING / SUBSTRATE_MISSING_CERTS: /gt_artifacts/$c absent after gt-run-proof" | tee -a trial_output.log; exit 1; }
          done
          echo "all 8 GT artifacts present under /tmp/gt (= /gt_artifacts)"

          # ── Cert-env handoff into the agent (§D) — the adapter reads these READ-ONLY ──
          # GT_HOST_GRAPH_DB + GT_CERT_DIR are the canonical host->agent handoff (proof.py
          # HOST_HANDOFF); the adapter resolves them via GTRuntimeContext.from_env (non-proof
          # host-handoff branch, context.py:111-112). GT_REPO_ROOT kept for adapter brief compat.
          {
            echo "GT_PORTABLE_SUBSTRATE=1"
            echo "GT_CERT_DIR=/tmp/gt"
            echo "GT_HOST_GRAPH_DB=/tmp/gt/graph.db"
            echo "GT_HOST_SRC_ROOT=/tmp/gt/src"
            echo "GT_REPO_ROOT=/tmp/gt/src"
            echo "GT_LSP_CERT=/tmp/gt/lsp_certificate.json"
            echo "GT_GRAPH_CERT=/tmp/gt/graph_certificate.json"
            echo "GT_EMBEDDER_CERT=/tmp/gt/embedder_certificate.json"
          } >> "$GITHUB_ENV"
          # Deep gate record alongside the per-task metrics (mandate: persist the 8-dp gate report).
          cp -f /tmp/gt/foundational_gate_report.json "/tmp/gt_gates_deep_${{ matrix.task }}.json" 2>/dev/null || true
          echo "substrate proof done: consumed /gt_artifacts; host LSP+gates SKIPPED (no divergent graph)"

      - name: Run GT trial
        # Cert-env handoff (§D): GT_CERT_DIR / GT_HOST_GRAPH_DB / GT_HOST_SRC_ROOT + the cert
        # paths were written to $GITHUB_ENV by the substrate-proof step and are inherited here;
        # GT_PROOF_MODE / GT_CONTAINERIZED / GT_RUNTIME_STRATEGY come from the top-level env.
        # The HOST-SIDE adapter (gt_agent.py witness/brief) consumes the HOST paths READ-ONLY
        # and emits the §H [GT_META] witness to stdout (captured in trial_output.log).
        #
        # ── hole #5: UNCONDITIONAL env passthrough INTO THE TASK CONTAINER ──────────────
        # The in-container patch (gt_mini_patch.py) runs as part of the mini-swe-agent
        # PROCESS, which pier launches via `docker compose exec -e KEY=VALUE main ...`. The
        # GHA top-level env: / $GITHUB_ENV reach ONLY the host runner (pier) — pier does NOT
        # blanket-forward os.environ into the task container. The VERIFIED forwarding path is
        # `pier run --ae KEY=VALUE` -> AgentConfig.env (cli/jobs.py:620,629) -> factory
        # extra_env (agents/factory.py:120) -> agent._extra_env -> build_process_env
        # (agents/installed/base.py:251-255) -> exec_as_agent(env=) -> environment.exec(env=)
        # -> DockerEnvironment.exec appends `-e KEY=VALUE` (environments/docker/docker.py:
        # 679-681). So the consume path is NOT conditional on a launcher that may not set it —
        # every GT var is forwarded EXPLICITLY here.
        #
        # CONTAINER paths, not host paths: gt_mini_patch is INSIDE the container, so the env it
        # reads must point at /gt_artifacts — the in-container mount target. `--mounts-json`
        # bind-mounts the host substrate dir (/tmp/gt) -> /gt_artifacts READ-ONLY so the path
        # the env names actually exists in the container (the substrate graph is the ONE graph;
        # ro => the in-container patch can never mutate/rebuild it — no divergent reindex).
        run: |
          echo "=== DeepSWE GT Trial: ${{ matrix.task }} (model ${{ inputs.model }}) ==="
          echo "HOST  GT_CERT_DIR=${GT_CERT_DIR:-<unset>}  GT_HOST_GRAPH_DB=${GT_HOST_GRAPH_DB:-<unset>}"
          echo "GT_PROOF_MODE=${GT_PROOF_MODE:-<unset>}  GT_CONTAINERIZED=${GT_CONTAINERIZED:-<unset>}  GT_SUBSTRATE_DIGEST=${GT_SUBSTRATE_DIGEST:-<unset>}"

          # In-container substrate dir (mount target). The host substrate dir is /tmp/gt
          # (written by the substrate-proof step); the container sees it as /gt_artifacts:ro.
          GT_C_ARTIFACTS=/gt_artifacts
          HOST_ARTIFACTS="${GT_CERT_DIR:-/tmp/gt}"

          # Bind-mount the host substrate dir into the task container READ-ONLY. JSON is the
          # pier --mounts-json contract (ServiceVolumeConfig: type/source/target/read_only).
          MOUNTS_JSON="[{\"type\":\"bind\",\"source\":\"${HOST_ARTIFACTS}\",\"target\":\"${GT_C_ARTIFACTS}\",\"read_only\":true}]"
          echo "CONTAINER mount: ${HOST_ARTIFACTS} -> ${GT_C_ARTIFACTS} (ro)"
          echo "mounts-json: ${MOUNTS_JSON}"

          # Forward the SUBSTRATE-CONSUME env into the container, pointing at /gt_artifacts.
          # GT_FORBID_PREBUILT_GRAPH + GT_PORTABLE_SUBSTRATE + GT_PROOF_MODE/GT_CONTAINERIZED
          # make the in-container pillars consume-or-fail-closed and keep L6 reindex OFF.
          # P0.1-b: pipefail + ${PIPESTATUS[0]} (the swebench_30task pattern) — without it
          # `pier ... | tee` returned tee's 0 and a swallowed adapter raise stayed GREEN.
          set +e
          set -o pipefail
          pier run \
            -p deepswe-bench/tasks/${{ matrix.task }} \
            --agent-import-path artifact_deepswe.gt_agent:GTMiniSweAgent \
            --model ${{ inputs.model }} \
            --env docker \
            -y \
            --mounts-json "${MOUNTS_JSON}" \
            --ae GT_HOST_GRAPH_DB="${GT_C_ARTIFACTS}/graph.db" \
            --ae GT_CERT_DIR="${GT_C_ARTIFACTS}" \
            --ae GT_HOST_SRC_ROOT="${GT_C_ARTIFACTS}/src" \
            --ae GT_PORTABLE_SUBSTRATE="1" \
            --ae GT_FORBID_PREBUILT_GRAPH="1" \
            --ae GT_PROOF_MODE="${GT_PROOF_MODE:-1}" \
            --ae GT_CONTAINERIZED="1" \
            --ae GT_RUNTIME_STRATEGY="${GT_RUNTIME_STRATEGY:-unified_substrate}" \
            --ak config_file=artifact_deepswe/gt_integration/deepswe_gt_pier.yaml \
            2>&1 | tee trial_output.log
          PIER_RC=${PIPESTATUS[0]}
          set -e
          echo "=== Trial complete (pier rc=$PIER_RC) ==="
          # P0.1-b: pier SWALLOWS adapter exceptions into result files (exception_message in
          # jobs/<ts>/<task>__*/result.json) — a DeepSweAdapterError can end the run with
          # pier rc=0. Surface it: any DeepSweAdapterError in the jobs dir or the trial log
          # fails the step with the DEEPSWE_ADAPTER_FAIL class (the witness step + the
          # outcome classifier both key on that marker -> class GT, never silent green).
          if grep -RIq "DeepSweAdapterError" jobs trial_output.log 2>/dev/null; then
            echo "DEEPSWE_ADAPTER_FAIL: DeepSweAdapterError found in pier jobs/exception_message (swallowed adapter raise)" | tee -a trial_output.log
            grep -RIn "DeepSweAdapterError" jobs trial_output.log 2>/dev/null | head -5 || true
            exit 1
          fi
          if [ "$PIER_RC" -ne 0 ]; then
            echo "PIER_RUN_FAIL: pier run exited rc=$PIER_RC (pipefail surfaced — not tee's 0)" | tee -a trial_output.log
            exit 1
          fi

      - name: Verify DeepSWE adapter witness (§E DEEPSWE_ADAPTER_FAIL / §H consumption proof)
        if: ${{ env.GT_PORTABLE_SUBSTRATE == '1' }}
        run: |
          # AGENT-OBSERVATION truth: the adapter emitted a [GT_META] witness to stdout. Prove
          # (1) it consumed the substrate graph (gt_prebuilt_active=true) and (2) the consumed
          # graph fingerprints to the substrate's post-LSP hash (hook_graph_hash_matches_post_lsp=True).
          # Any error=DEEPSWE_ADAPTER_FAIL or a hash mismatch fails the task (no silent degrade).
          if grep -q "error=DEEPSWE_ADAPTER_FAIL" trial_output.log; then
            echo "DEEPSWE_ADAPTER_FAIL: the adapter failed to wire/consume the substrate artifacts:"
            grep "DEEPSWE_ADAPTER_FAIL" trial_output.log | head -5
            exit 1
          fi
          if ! grep -q "gt_prebuilt_active=true" trial_output.log; then
            echo "GT_ARTIFACT_NOT_CONSUMED: no [GT_META] witness with gt_prebuilt_active=true — the"
            echo "adapter did not consume the substrate graph (delivery, not telemetry)."
            grep "\[GT_META\]" trial_output.log | head -5 || echo "(no [GT_META] line at all)"
            exit 1
          fi
          if grep -q "hook_graph_hash_matches_post_lsp=False" trial_output.log; then
            echo "GRAPH_FAIL_HASH_MISMATCH: hook_graph_hash != graph_hash_after_lsp — the consumed"
            echo "graph diverges from the substrate's LSP-resolved graph."
            grep "hook_graph_hash_matches_post_lsp" trial_output.log | head -3
            exit 1
          fi
          echo "adapter witness OK: substrate graph consumed read-only; hook hash == post-LSP hash"
          grep "\[GT_META\] graph_witness" trial_output.log | head -2 || true

      - name: Collect results
        if: always()
        run: |
          mkdir -p trial_results trial_results/gt_artifacts
          cp trial_output.log trial_results/ 2>/dev/null || true
          cp /tmp/gt/graph.db trial_results/graph.db 2>/dev/null || true
          # §F.10 — upload the 8 GT artifacts the substrate emitted (the proof set, incl.
          # brief.txt + per-language LSP certs), even on task failure. graph.db is already
          # copied above; mirror the certs + manifests + brief.
          for a in runtime_context.json lsp_certificate.json graph_certificate.json \
                   embedder_certificate.json foundational_gate_report.json run_manifest.json \
                   brief.txt gt_issue_anchors.json gt_scope_files.txt gt_lsp_metrics.txt; do
            cp "/tmp/gt/$a" "trial_results/gt_artifacts/$a" 2>/dev/null || true
          done
          # P1-e: per-language LSP certificates (polyglot aggregation — no FAIL cert overwritten)
          cp /tmp/gt/lsp_certificate_*.json trial_results/gt_artifacts/ 2>/dev/null || true
          cp /tmp/gt/delivered_instruction.txt trial_results/ 2>/dev/null || true
          cp -r jobs trial_results/jobs 2>/dev/null || true
          cp /tmp/gt/*.log              trial_results/ 2>/dev/null || true
          cp /tmp/gt/gt_interactions*.jsonl trial_results/ 2>/dev/null || true
          cp /tmp/gt/gt_hooks*.log      trial_results/ 2>/dev/null || true
          # Deep 8-dp metrics (constitution mandate: token/cost efficiency + per-layer)
          cp /tmp/gt/gt_run_summary*.json /tmp/gt_run_summary_${{ matrix.task }}.json 2>/dev/null || true
          PYTHONPATH=${{ github.workspace }}/src python3 scripts/swebench/gt_deep_metrics.py "${{ matrix.task }}" /tmp/gt --log trial_output.log 2>&1 | tail -2 || echo DEEP_METRICS_WARN
          cp /tmp/gt_deep_metrics_${{ matrix.task }}.json trial_results/ 2>/dev/null || true
          cp /tmp/gt_deep_metrics_${{ matrix.task }}.md   trial_results/ 2>/dev/null || true   # human-readable: steps/tokens/money/GT-delivery
          # Run provenance on the DeepSWE path: the REAL provenance manifest is
          # run_manifest.json (emitted by gt-run-proof inside the substrate; copied into
          # trial_results/gt_artifacts/ above — gt_git_commit / substrate_digest /
          # task_repo_commit / runtime_flags / language_distribution / graph_db_sha256 /
          # cert_versions). The old gt_legitimacy_manifest_*.json copy was DEAD — no
          # DeepSWE step ever wrote it (scripts/verify/legitimacy.py is OH-path only).
          # Plus a small per-job provenance file: bench clone SHA + GT commit + digest.
          python3 -c "import json,os;json.dump({'schema':'gt.deepswe_run_provenance.v1','task':'${{ matrix.task }}','deepswe_bench_sha':os.environ.get('GT_DEEPSWE_BENCH_SHA') or None,'gt_git_commit':os.environ.get('GITHUB_SHA') or None,'substrate_digest':os.environ.get('GT_SUBSTRATE_DIGEST') or None,'workflow_run_id':os.environ.get('GITHUB_RUN_ID') or None,'workflow_run_attempt':os.environ.get('GITHUB_RUN_ATTEMPT') or None},open('trial_results/gt_artifacts/run_provenance.json','w'),indent=2)" \
            || echo "WARN: run_provenance.json write failed"
          python3 scripts/verify/deepswe_outcome.py jobs || echo "WARN: outcome extract failed"
          find trial_results -type f | head -40

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepswe-full-${{ matrix.task }}
          path: trial_results/
          retention-days: 30
          if-no-files-found: warn

  summarize:
    # prepare is in needs so its outputs (total, bench_sha) are guaranteed in the needs
    # context here (GHA populates needs.<job> only for DIRECT dependencies).
    needs: [prepare, trial]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/all
          pattern: deepswe-full-*
      - name: Aggregate DeepSWE benchmark results
        run: |
          echo "## DeepSWE full benchmark — ${{ needs.prepare.outputs.total }} tasks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Run provenance (Stage-5): which code produced this run.
          echo "**Provenance** — GT commit: \`${{ github.sha }}\` | deepswe-bench clone SHA: \`${{ needs.prepare.outputs.bench_sha }}\` | substrate digest: \`${GT_SUBSTRATE_DIGEST:-<unset>}\`" >> $GITHUB_STEP_SUMMARY
          echo "Per-task: \`gt_artifacts/run_manifest.json\` (gt_git_commit / substrate_digest / task_repo_commit / runtime_flags / language_distribution / graph_db_sha256 / cert_versions) + \`gt_artifacts/run_provenance.json\` (per-job bench SHA)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # P0.1-d: parse the n_agent_steps VALUE and require >0. The old check counted the
          # mere PRESENCE of the token "AGENT_RAN_STEPS|n_agent_steps" — a 0-step / None /
          # UNKNOWN launch failure carries the token too, so a whole-run launch outage still
          # summarized as "agent-ran" (the green-zero-run chain). Numeric-only match:
          # AGENT_RAN_STEPS=None / =UNKNOWN do NOT parse; absent or ==0 counts as launch-fail.
          RAN=0; TOTAL=0; LAUNCH_FAIL=0
          for d in /tmp/all/deepswe-full-*; do
            [ -d "$d" ] || continue
            TOTAL=$((TOTAL+1))
            STEPS=$(grep -rhoE "AGENT_RAN_STEPS=[0-9]+" "$d" 2>/dev/null | head -1 | grep -oE "[0-9]+$" || true)
            if [ -z "$STEPS" ]; then
              STEPS=$(grep -rhoE '"n_agent_steps"[[:space:]]*:[[:space:]]*[0-9]+' "$d" 2>/dev/null | head -1 | grep -oE "[0-9]+$" || true)
            fi
            if [ -n "$STEPS" ] && [ "$STEPS" -gt 0 ]; then
              RAN=$((RAN+1))
            else
              LAUNCH_FAIL=$((LAUNCH_FAIL+1))
              echo "launch-fail (n_agent_steps=${STEPS:-absent}): $(basename "$d")"
            fi
          done
          echo "Artifacts collected: $TOTAL  |  agent-ran (n_agent_steps>0 PARSED): $RAN  |  launch-fail (steps 0/absent): $LAUNCH_FAIL" >> $GITHUB_STEP_SUMMARY
          echo "Per-task outcome detail is in scripts/verify/deepswe_outcome.py output inside each artifact." >> $GITHUB_STEP_SUMMARY
