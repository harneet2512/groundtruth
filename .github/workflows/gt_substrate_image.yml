name: "GT substrate image — build + push (one image, runs in any eval container)"

# Builds docker/Dockerfile.gt-substrate and pushes it to GHCR. The Dockerfile runs a
# build-time self-test (gt-index + onnxruntime + pyright + e5 all present and runnable
# on glibc 2.31), so a substrate with a missing library CANNOT be published. Built
# once, cached; the eval pipeline copies /opt/gt out of this image into the eval
# container and runs the whole substrate there (no per-job pip-install, no host split).
#
# Manual dispatch only — nothing auto-runs.

on:
  workflow_dispatch: {}
  push:
    branches: [gt-trial]
    paths:
      - "docker/Dockerfile.gt-substrate"
      - "docker/gt-substrate-run.sh"
      - ".github/workflows/gt_substrate_image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push GT substrate image (build-time self-test gates it)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.gt-substrate
          push: true
          tags: |
            ghcr.io/hbali-stack/gt-substrate:latest
            ghcr.io/hbali-stack/gt-substrate:${{ github.sha }}
          # RC-17 build stamp: gt-index embeds this commit via -X main.commitSHA so the
          # baked binary never prints "Commit/Toolchain: unknown" (preflight provenance).
          build-args: |
            GT_COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}

      - name: Confirm the published image's closure runs on glibc 2.31
        run: |
          set -euo pipefail
          docker run --rm ghcr.io/hbali-stack/gt-substrate:latest bash -lc '
            gt-index -h >/dev/null 2>&1 && echo "gt-index ok"
            /opt/gt/python/bin/python3 -c "import onnxruntime,numpy,pydantic,tokenizers; print(\"py ok\")"
            pyright --version
            typescript-language-server --version
            gopls version
            rust-analyzer --version
            test -x /opt/gt/bin/jdtls && /opt/gt/jre/bin/java -version
            test -s /opt/gt/models/gte-modernbert-base/model.onnx && echo "gte ok"
            test -s /opt/gt/models/e5-small-v2/model.onnx && echo "e5 ok"
            /opt/gt/python/bin/python3 -c "import sys; sys.path.insert(0,\"/opt/gt/src\"); from groundtruth.memory.enrich.embed import get_embedding_model, _default_embed_model; print(\"default embedder:\", _default_embed_model()); m=get_embedding_model(); v=m.embed(\"x\", is_query=True); assert any(v) and len(v)==m.dim; print(\"embedder ok dim=\", m.dim)"
            echo "=== GT substrate image verified portable (LSP py/ts/go/rust/java; embedder gte+e5) ==="'

      - name: Verify gt-run-proof portable entrypoint is baked (Stage 4.2)
        run: |
          docker run --rm "ghcr.io/hbali-stack/gt-substrate@${{ steps.build.outputs.digest }}" \
            gt-run-proof --print-contract | head -8

      - name: Capture immutable digest (the pinned proof input — NOT a mutable tag)
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          PINNED="ghcr.io/hbali-stack/gt-substrate@${DIGEST}"
          echo "GT_SUBSTRATE_DIGEST=$PINNED"
          { echo "## GT substrate pinned digest"; echo '```'; \
            echo "GT_SUBSTRATE_DIGEST=$PINNED"; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          mkdir -p /tmp/gt_digest && echo "$PINNED" > /tmp/gt_digest/GT_SUBSTRATE_DIGEST.txt

      - name: Upload pinned digest
        uses: actions/upload-artifact@v4
        with:
          name: gt-substrate-digest
          path: /tmp/gt_digest/GT_SUBSTRATE_DIGEST.txt
          if-no-files-found: warn
